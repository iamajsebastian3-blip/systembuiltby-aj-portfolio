<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero Variation 6 — Sample Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:             #0A0A0A;
    --accent:         #3B9EE8;
    --accent-hover:   #5BB5F2;
    --text:           #FFFFFF;
    --muted:          #9A9A9A;
    --overlay:        rgba(0, 0, 0, 0.65);
    --nav-height:     65px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  /* HERO container */
  .hero { position: relative; min-height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .hero-bg { position: absolute; inset: 0; z-index: 0; background-image: var(--bg-image); background-size: cover; background-position: center; }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.55) 45%, var(--overlay) 100%);
  }

  /* NAV */
  .nav { position: relative; z-index: 5; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; padding: 0 64px; opacity: 0; transform: translateY(-8px); animation: navIn .7s .15s ease forwards; max-width: 1600px; width: 100%; margin: 0 auto; }
  @keyframes navIn { to { opacity: 1; transform: translateY(0); } }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-logo-img { width: 32px; height: 32px; border-radius: 6px; background: var(--accent); display: grid; place-items: center; color: #061421; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; }
  .nav-logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.16em; font-size: 13px; color: var(--text); }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; transition: color .2s ease; position: relative; }
  .nav-links a::after { content: ''; position: absolute; left: 0; right: 0; bottom: -6px; height: 1px; background: var(--accent); transform: scaleX(0); transition: transform .25s ease; transform-origin: left; }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-burger { display: none; }

  /* SPLIT GRID */
  .hero-grid {
    position: relative; z-index: 2; flex: 1;
    display: grid;
    grid-template-columns: minmax(0, 640px) auto;
    align-items: end;
    justify-content: center;
    gap: 80px;
    padding: 0 64px 140px;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* LEFT */
  .copy { max-width: 640px; padding-bottom: 50px; }
  .eyebrow { color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: 0.32em; text-transform: uppercase; margin-bottom: 26px; opacity: 0; transform: translateY(12px); animation: rise .8s .3s ease forwards; }
  .headline { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(44px, 6.4vw, 84px); line-height: 1.02; color: var(--text); margin-bottom: 28px; }
  .headline .line { display: block; opacity: 0; transform: translateY(18px); }
  .headline .l1 { animation: rise .9s .4s ease forwards; }
  .headline .l2 { animation: rise .9s .5s ease forwards; color: var(--accent); }
  .headline .l3 { animation: rise .9s .6s ease forwards; }
  .sub { color: var(--muted); font-size: clamp(15px, 1.2vw, 18px); line-height: 1.65; font-weight: 300; max-width: 480px; margin-bottom: 40px; opacity: 0; transform: translateY(12px); animation: rise .9s .7s ease forwards; }
  .ctas { display: flex; gap: 22px; align-items: center; opacity: 0; transform: translateY(12px); animation: rise .9s .8s ease forwards; }
  .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 16px 30px; border-radius: 999px; background: var(--accent); color: var(--text); border: none; cursor: pointer; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; text-decoration: none; transition: background-color .2s ease, transform .2s ease, box-shadow .25s ease; box-shadow: 0 10px 28px rgba(59,158,232,0.25); }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px) scale(1.02); box-shadow: 0 14px 40px rgba(59,158,232,0.42); }
  .btn-watch { display: inline-flex; align-items: center; gap: 10px; background: transparent; border: none; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; cursor: pointer; opacity: 0.85; transition: opacity .2s ease; padding: 0; }
  .btn-watch:hover { opacity: 1; }
  .btn-watch .play-icon { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--text); display: grid; place-items: center; }
  .btn-watch .play-icon svg { width: 12px; height: 12px; fill: var(--text); margin-left: 2px; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* RIGHT — person */
  .person-col {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    transform: translateX(20px);
    animation: personIn 1s .5s ease forwards;
  }
  @keyframes personIn { to { opacity: 1; transform: translateX(0); } }
  .person-col img {
    display: block;
    height: auto;
    width: clamp(380px, 42vw, 620px);
    max-height: calc(100vh - 180px);
    object-fit: contain;
    object-position: center bottom;
  }
  .person-col::after { content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 80px; background: linear-gradient(to top, rgba(10,10,10,0.7), transparent); pointer-events: none; }

  /* FEATURED IN BAR */
  .featured-bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3; padding: 22px 48px 24px; background: rgba(0,0,0,0.55); backdrop-filter: blur(6px); border-top: 1px solid rgba(255,255,255,0.06); opacity: 0; transform: translateY(10px); animation: rise .8s 1s ease forwards; text-align: center; }
  .featured-label { color: var(--muted); font-size: 10.5px; font-weight: 600; letter-spacing: 0.26em; text-transform: uppercase; margin-bottom: 12px; }
  .featured-names { display: flex; gap: clamp(22px, 4vw, 56px); justify-content: center; align-items: center; flex-wrap: wrap; color: rgba(255,255,255,0.85); }
  .featured-names span { font-family: 'Playfair Display', serif; font-size: clamp(16px, 1.9vw, 22px); font-weight: 700; letter-spacing: 0.02em; filter: grayscale(1); opacity: 0.78; transition: opacity .25s, filter .25s; cursor: default; }
  .featured-names span:hover { opacity: 1; filter: none; }
  .featured-names .sans { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  .featured-names .upper { text-transform: uppercase; letter-spacing: 0.22em; font-size: clamp(13px, 1.5vw, 18px); }

  /* MOBILE */
  @media (max-width: 768px) {
    .nav { padding: 0 18px; }
    .nav-links { display: none; }
    .nav-burger { display: grid; place-items: center; width: 40px; height: 40px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: var(--text); cursor: pointer; opacity: 0; animation: navIn .7s .15s ease forwards; }
    .hero-grid { grid-template-columns: 1fr; padding: 32px 22px 160px; gap: 22px; text-align: center; }
    .copy { max-width: 100%; padding-right: 0; }
    .headline { font-size: clamp(32px, 8vw, 44px); }
    .sub { max-width: 100%; margin-left: auto; margin-right: auto; }
    .ctas { flex-direction: column; align-items: stretch; gap: 14px; }
    .btn-primary, .btn-watch { width: 100%; justify-content: center; }
    .person-col { min-height: 360px; }
    .person-col img { position: relative; right: auto; bottom: auto; max-height: 360px; margin: 0 auto; display: block; }
    .featured-bar { padding: 18px 18px 22px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg" id="hero-bg"></div>

  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo-img" id="logo-img">D</div>
      <span class="nav-logo-text" id="logo-text">DAVID CHEN</span>
    </div>
    <div class="nav-links" id="nav-links"></div>
    <button class="nav-burger" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>

  <div class="hero-grid">
    <div class="copy">
      <p class="eyebrow" id="eyebrow">Strategic Growth Partner</p>
      <h1 class="headline">
        <span class="line l1">Scale Smarter.</span>
        <span class="line l2">Lead Bolder.</span>
        <span class="line l3">Win Bigger.</span>
      </h1>
      <p class="sub" id="sub">Helping ambitious founders turn complexity into clarity — and growth into momentum. Tailored 1:1 strategy for businesses ready for the next chapter.</p>
      <div class="ctas">
        <a href="#book" class="btn-primary">
          Book a Strategy Call
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </a>
        <button class="btn-watch" id="watch">
          <span class="play-icon">
            <svg viewBox="0 0 24 24"><polygon points="7,4 20,12 7,20"/></svg>
          </span>
          Watch
        </button>
      </div>
    </div>

    <div class="person-col">
      <img src="/private/hero-v6-person.webp" alt="David Chen portrait" />
    </div>
  </div>

  <div class="featured-bar">
    <p class="featured-label" id="featured-label">David Chen Has Been Featured In:</p>
    <div class="featured-names" id="featured-names"></div>
  </div>
</section>

<script>
  const BG_IMAGE   = "/private/hero-v6-bg.webp";
  const LOGO_TEXT  = "DAVID CHEN";
  const VIDEO_URL  = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  const NAV_LINKS = [
    { label: "About",     href: "#about"     },
    { label: "Programs",  href: "#programs"  },
    { label: "Results",   href: "#results"   },
    { label: "Resources", href: "#resources" },
    { label: "Contact",   href: "#contact"   },
  ];
  const FEATURED_LABEL = "David Chen Has Been Featured In:";
  const FEATURED_NAMES = [
    { name: "Forbes",       cls: ""        },
    { name: "Entrepreneur", cls: ""        },
    { name: "TIME",         cls: "upper"   },
    { name: "Inc.",         cls: ""        },
    { name: "SUCCESS",      cls: "upper"   },
    { name: "Fortune",      cls: "sans upper" },
  ];

  document.documentElement.style.setProperty('--bg-image', `url('${BG_IMAGE}')`);
  document.getElementById('logo-text').textContent = LOGO_TEXT;
  document.getElementById('logo-img').textContent = LOGO_TEXT[0];
  document.getElementById('nav-links').innerHTML = NAV_LINKS.map(l => `<a href="${l.href}">${l.label}</a>`).join('');
  document.getElementById('featured-label').textContent = FEATURED_LABEL;
  document.getElementById('featured-names').innerHTML = FEATURED_NAMES.map(f => `<span class="${f.cls}">${f.name}</span>`).join('');

  document.getElementById('watch').addEventListener('click', () => {
    if (VIDEO_URL) window.open(VIDEO_URL, '_blank', 'noopener,noreferrer');
  });
</script>

</body>
</html>
