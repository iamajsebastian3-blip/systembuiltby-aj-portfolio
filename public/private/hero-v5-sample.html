<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero Variation 5 — Sample Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:             #0D0D0D;
    --accent:         #C9922A;
    --accent-hover:   #E0A830;
    --text:           #FFFFFF;
    --muted:          #B0B0B0;
    --overlay-left:   rgba(0, 0, 0, 0.75);
    --overlay-right:  rgba(0, 0, 0, 0.15);
    --nav-height:     65px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  .hero { position: relative; min-height: 100vh; height: 100vh; overflow: hidden; background: var(--bg); }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background-image: var(--person-img);
    background-size: auto 100%;
    background-position: right center;
    background-repeat: no-repeat;
    background-color: var(--bg);
    animation: kenburns 30s ease-in-out infinite alternate;
  }
  @keyframes kenburns { 0% { transform: scale(1); } 100% { transform: scale(1.04); } }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 25%, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.20) 65%, var(--overlay-right) 100%),
      radial-gradient(ellipse 90% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.4) 100%);
  }

  /* NAV */
  .nav { position: relative; z-index: 5; height: var(--nav-height); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 40px; gap: 24px; }
  .nav > * { opacity: 0; transform: translateY(-8px); animation: navIn .7s .2s ease forwards; }
  @keyframes navIn { to { opacity: 1; transform: translateY(0); } }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-logo-img { width: 32px; height: 32px; border-radius: 6px; background: var(--accent); display: grid; place-items: center; color: #0D0D0D; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; }
  .nav-logo-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: 0.14em; font-size: 14px; color: var(--text); }
  .nav-links { display: flex; gap: 32px; justify-self: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; transition: color .2s ease; position: relative; }
  .nav-links a::after { content: ''; position: absolute; left: 0; right: 0; bottom: -6px; height: 1px; background: var(--accent); transform: scaleX(0); transition: transform .25s ease; transform-origin: left; }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .social { display: flex; gap: 10px; justify-self: end; }
  .social a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.18); display: grid; place-items: center; color: var(--muted); transition: color .2s, border-color .2s, background-color .2s, transform .2s; }
  .social a:hover { color: var(--accent); border-color: var(--accent); background: rgba(201,146,42,0.08); transform: translateY(-2px); }
  .social svg { width: 14px; height: 14px; }
  .nav-burger { display: none; }

  /* CONTENT */
  .content { position: absolute; left: 0; right: 0; bottom: 0; padding: 60px 60px 70px; z-index: 3; }
  .eyebrow { color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 18px; opacity: 0; transform: translateY(14px); animation: rise .8s .3s ease forwards; }
  .headline { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(40px, 6.5vw, 92px); line-height: 0.98; letter-spacing: -0.01em; color: var(--text); margin-bottom: 26px; max-width: 55%; }
  .headline .line { display: block; opacity: 0; transform: translateY(20px); }
  .headline .l1 { animation: rise .9s .4s ease forwards; }
  .headline .l2 { animation: rise .9s .5s ease forwards; font-style: italic; color: var(--accent); }
  .headline .l3 { animation: rise .9s .6s ease forwards; }
  .sub { color: var(--muted); font-size: clamp(14px, 1.2vw, 16px); line-height: 1.6; font-weight: 300; max-width: 45%; margin-bottom: 36px; opacity: 0; transform: translateY(14px); animation: rise .9s .7s ease forwards; }
  .ctas { display: flex; gap: 14px; opacity: 0; transform: translateY(14px); animation: rise .9s .8s ease forwards; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 16px 32px; border-radius: 999px; font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; text-decoration: none; cursor: pointer; transition: transform .2s ease, background-color .2s ease, color .2s ease, border-color .2s ease, filter .2s ease; }
  .btn-primary { background: var(--accent); color: #1A1206; border: 1px solid var(--accent); box-shadow: 0 10px 28px rgba(201,146,42,0.22); }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); transform: translateY(-2px) scale(1.02); filter: brightness(1.03); }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid rgba(255,255,255,0.4); }
  .btn-secondary:hover { background: var(--text); color: #0D0D0D; border-color: var(--text); transform: translateY(-2px); }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* MOBILE */
  @media (max-width: 768px) {
    .hero { height: auto; min-height: 100vh; }
    .hero-bg { background-size: cover; background-position: center top; }
    .hero-bg::after { background: linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0.9) 75%, var(--bg) 100%); }
    .nav { padding: 0 18px; grid-template-columns: 1fr auto; }
    .nav-links, .social { display: none; }
    .nav-burger { display: grid; place-items: center; width: 40px; height: 40px; background: transparent; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: var(--text); justify-self: end; cursor: pointer; opacity: 0; animation: navIn .7s .2s ease forwards; }
    .content { position: relative; padding: 60vh 22px 50px; text-align: center; }
    .headline, .sub { max-width: 100%; }
    .headline { font-size: clamp(34px, 9vw, 52px); }
    .ctas { flex-direction: column; gap: 12px; }
    .btn { width: 100%; justify-content: center; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; transition-duration: 0.001s !important; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg" id="hero-bg"></div>

  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-logo-img" id="logo-img">M</div>
      <span class="nav-logo-text" id="logo-text">MARCUS HALE</span>
    </div>
    <div class="nav-links" id="nav-links"></div>
    <div class="social" id="social"></div>
    <button class="nav-burger" aria-label="Menu">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </nav>

  <div class="content">
    <p class="eyebrow" id="eyebrow">Elite Executive Coaching</p>
    <h1 class="headline">
      <span class="line l1">Redefine What's</span>
      <span class="line l2">Possible</span>
      <span class="line l3">For Your Business</span>
    </h1>
    <p class="sub" id="sub">Strategic 1:1 coaching for ambitious founders who refuse to settle for ordinary results — and are ready to build a business that scales without burning out.</p>
    <div class="ctas">
      <a href="#apply" class="btn btn-primary">
        Apply Now
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <a href="#learn-more" class="btn btn-secondary">Learn More</a>
    </div>
  </div>
</section>

<script>
  const PERSON_IMG  = "/private/hero-v5-person.webp";
  const LOGO_TEXT   = "MARCUS HALE";
  const NAV_LINKS = [
    { label: "About",     href: "#about"     },
    { label: "Programs",  href: "#programs"  },
    { label: "Results",   href: "#results"   },
    { label: "Resources", href: "#resources" },
    { label: "Contact",   href: "#contact"   },
  ];
  const SOCIAL_LINKS = [
    { icon: 'facebook',  href: '#', svg: '<path d="M22 12a10 10 0 1 0-11.5 9.9v-7H8v-3h2.5V9.5C10.5 7.5 11.7 6.5 13.5 6.5c.9 0 1.8.2 1.8.2v2H14.2c-1 0-1.4.6-1.4 1.4V12h2.6l-.4 3h-2.2v7A10 10 0 0 0 22 12z"/>' },
    { icon: 'linkedin',  href: '#', svg: '<path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM8 17H6V10h2v7zM7 9a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 7 9zM18 17h-2v-3.6c0-1-.4-1.4-1-1.4s-1 .4-1 1.4V17h-2V10h2v.9c.4-.6 1-.9 1.7-.9 1.4 0 2.3.9 2.3 2.7V17z"/>' },
    { icon: 'youtube',   href: '#', svg: '<path d="M23 7.2a3 3 0 0 0-2.1-2.1C19 4.5 12 4.5 12 4.5s-7 0-8.9.6A3 3 0 0 0 1 7.2 31 31 0 0 0 .5 12 31 31 0 0 0 1 16.8a3 3 0 0 0 2.1 2.1c1.9.6 8.9.6 8.9.6s7 0 8.9-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.5 12 31 31 0 0 0 23 7.2zM9.8 15.4V8.6l5.8 3.4-5.8 3.4z"/>' },
    { icon: 'twitter',   href: '#', svg: '<path d="M22 5.8c-.7.3-1.5.6-2.3.7a4 4 0 0 0 1.8-2.2c-.8.5-1.7.8-2.6 1a4 4 0 0 0-6.8 3.6A11.4 11.4 0 0 1 3.4 4.7a4 4 0 0 0 1.2 5.4c-.6 0-1.3-.2-1.8-.5v.1a4 4 0 0 0 3.2 4 4 4 0 0 1-1.8.1 4 4 0 0 0 3.7 2.8 8 8 0 0 1-6 1.7A11.3 11.3 0 0 0 8.1 20c7.3 0 11.4-6.1 11.4-11.4v-.5c.8-.6 1.5-1.4 2-2.2z"/>' },
  ];

  document.documentElement.style.setProperty('--person-img', `url('${PERSON_IMG}')`);
  document.getElementById('logo-text').textContent = LOGO_TEXT;
  document.getElementById('logo-img').textContent = LOGO_TEXT[0];
  document.getElementById('nav-links').innerHTML = NAV_LINKS.map(l => `<a href="${l.href}">${l.label}</a>`).join('');
  document.getElementById('social').innerHTML = SOCIAL_LINKS.map(s => `<a href="${s.href}" aria-label="${s.icon}"><svg viewBox="0 0 24 24" fill="currentColor">${s.svg}</svg></a>`).join('');
</script>

</body>
</html>
