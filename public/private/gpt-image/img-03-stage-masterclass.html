<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>GPT Image Example — Live Stage (Masterclass Spotlight)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0a0a0a;color:#fff;font-family:'Inter',-apple-system,sans-serif;overflow:hidden;}
  .frame{position:fixed;inset:0;overflow:hidden;}
  .photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;animation:kenBurns 22s ease-out infinite alternate;}
  @keyframes kenBurns{ from{transform:scale(1.0);} to{transform:scale(1.08);} }
  .vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);pointer-events:none;}
  .label{position:absolute;top:24px;left:24px;display:inline-flex;align-items:center;gap:10px;background:rgba(0,0,0,0.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:9px 14px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;border:1px solid rgba(163,230,53,0.35);color:#A3E635;}
  .label b{color:#fff;font-weight:600;letter-spacing:0.08em;}
  .label .dot{width:6px;height:6px;border-radius:50%;background:#A3E635;box-shadow:0 0 8px rgba(163,230,53,0.65);}
  .meta{position:absolute;bottom:22px;right:24px;font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.55);}
</style>
</head>
<body>
<div class="frame">
  <img class="photo" src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1920&q=85" alt="Live Stage — Masterclass Spotlight example output" />
  <div class="vignette"></div>
  <div class="label"><span class="dot"></span>GPT Image BG · <b>Live Stage — Masterclass Spotlight</b></div>
  <div class="meta">Example output · IMG-03</div>
</div>
</body>
</html>
