<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Introducing the AI Academy | USP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #030110;
    --accent: #6366F1;
    --text:   #FFFFFF;
    --muted:  rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.08);
    --card:   rgba(255,255,255,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
  }

  .section {
    position: relative;
    padding: 110px 24px;
    background: var(--bg);
    overflow: hidden;
  }

  .section::before {
    content: "";
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 760px;
    height: 760px;
    max-width: 100%;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ---------- Header ---------- */
  .header { text-align: center; margin-bottom: 48px; }

  .label {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--muted);
    margin-bottom: 18px;
  }

  .h2 {
    font-size: clamp(28px, 4.6vw, 42px);
    font-weight: 700;
    line-height: 1.18;
    letter-spacing: -0.5px;
  }
  .h2 .line { color: var(--text); display: block; }
  .h2 .accent {
    display: inline;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    color: var(--accent);
  }

  .sub {
    margin: 22px auto 0;
    max-width: 600px;
    font-size: 17px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ---------- Laptop mockup (pure CSS) ---------- */
  .mockup-wrap {
    position: relative;
    max-width: 620px;
    margin: 0 auto 64px;
    will-change: transform, opacity;
  }

  .laptop {
    position: relative;
    z-index: 2;
  }

  .laptop-screen {
    position: relative;
    background: linear-gradient(160deg, #0b0930 0%, #07061f 100%);
    border: 1px solid rgba(255,255,255,0.10);
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    padding: 14px;
    box-shadow: 0 0 60px rgba(99,102,241,0.18), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  /* browser top bar */
  .screen-bar {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 4px 12px;
  }
  .screen-bar .d { width: 9px; height: 9px; border-radius: 50%; }
  .screen-bar .d.r { background: #ff5f57; }
  .screen-bar .d.y { background: #febc2e; }
  .screen-bar .d.g { background: #28c840; }
  .screen-bar .url {
    margin-left: 10px;
    flex: 1;
    height: 18px;
    border-radius: 5px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.07);
  }

  .screen-inner {
    position: relative;
    border-radius: 8px;
    background:
      radial-gradient(circle at 30% 25%, rgba(99,102,241,0.22) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(99,102,241,0.12) 0%, transparent 55%),
      #06041a;
    border: 0.5px solid rgba(255,255,255,0.06);
    min-height: 210px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 28px;
  }

  /* faint grid lines inside screen */
  .screen-inner::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .screen-logo {
    position: relative;
    z-index: 1;
    text-align: center;
  }
  .screen-logo .mark {
    width: 52px;
    height: 52px;
    margin: 0 auto 14px;
    border-radius: 13px;
    background: linear-gradient(135deg, #6366F1, #4338ca);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 28px rgba(99,102,241,0.45);
  }
  .screen-logo .mark svg { width: 28px; height: 28px; color: #fff; }
  .screen-logo .brand {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: #fff;
  }
  .screen-logo .tag {
    margin-top: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  /* laptop base / hinge */
  .laptop-base {
    height: 16px;
    background: linear-gradient(180deg, #1a1830 0%, #0c0b1c 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-top: none;
    border-radius: 0 0 16px 16px;
    position: relative;
    box-shadow: 0 18px 40px rgba(0,0,0,0.55);
  }
  .laptop-base::after {
    content: "";
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 5px;
    border-radius: 0 0 6px 6px;
    background: rgba(255,255,255,0.06);
  }

  /* floating pill badges */
  .badge {
    position: absolute;
    z-index: 3;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 15px;
    border-radius: 12px;
    background: rgba(13, 11, 40, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 0.5px solid rgba(99,102,241,0.35);
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
    animation: floaty 4s ease-in-out infinite;
  }
  .badge svg { width: 16px; height: 16px; color: var(--accent); }
  .badge.b1 { top: 26px; right: -28px; animation-delay: 0s; }
  .badge.b2 { bottom: 26px; left: -32px; animation-delay: 1.2s; }

  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-9px); }
  }

  /* ---------- Feature cards 2x2 ---------- */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 56px;
  }

  .feature {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 26px 24px;
    transition: border-color 0.25s ease, transform 0.25s ease, background 0.25s ease;
  }
  .feature:hover {
    border-color: rgba(99,102,241,0.3);
    transform: translateY(-2px);
  }
  .feature.highlight {
    background: rgba(99,102,241,0.06);
    border: 0.5px solid rgba(99,102,241,0.4);
    box-shadow: 0 0 40px rgba(99,102,241,0.10);
  }

  .feature .f-ico {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: rgba(99,102,241,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .feature .f-ico svg { width: 24px; height: 24px; }

  .feature .f-title {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }
  .feature .f-body {
    font-size: 14px;
    line-height: 1.6;
    color: var(--muted);
  }

  /* ---------- CTA + Countdown ---------- */
  .cta-block { text-align: center; }

  .cta-btn {
    display: inline-block;
    padding: 16px 34px;
    border-radius: 999px;
    background: #1A1835;
    border: 1px solid rgba(99,102,241,0.5);
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: box-shadow 0.3s ease, transform 0.2s ease, background 0.3s ease;
  }
  .cta-btn:hover {
    box-shadow: 0 0 36px rgba(99,102,241,0.55);
    background: #221f44;
    transform: translateY(-1px);
  }

  .urgency {
    margin-top: 16px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--muted);
  }

  .countdown {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .cd-box {
    min-width: 70px;
    padding: 12px 8px;
    border-radius: 12px;
    background: rgba(255,255,255,0.03);
    border: 0.5px solid var(--border);
  }
  .cd-box .num {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    line-height: 1;
  }
  .cd-box .lbl {
    margin-top: 7px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: var(--muted);
  }

  /* ---------- reveals ---------- */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: 0.1s; }
  .reveal.delay-2 { transition-delay: 0.2s; }
  .reveal.delay-3 { transition-delay: 0.3s; }
  .reveal.delay-4 { transition-delay: 0.4s; }

  .scale-in { opacity: 0; transform: scale(0.95); transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1); }
  .scale-in.visible { opacity: 1; transform: scale(1); }

  /* ---------- Mobile ---------- */
  @media (max-width: 768px) {
    .section { padding: 72px 18px; }
    .features { grid-template-columns: 1fr; }
    .mockup-wrap { margin-bottom: 80px; }
    .badge.b1 { right: -8px; }
    .badge.b2 { left: -8px; }
    .countdown { gap: 8px; }
    .cd-box { min-width: 60px; }
    .cd-box .num { font-size: 23px; }
  }
</style>
</head>
<body>
  <section class="section">
    <div class="container">
      <div class="header reveal">
        <span class="label" id="js-label"></span>
        <h2 class="h2">
          <span class="line" id="js-line1"></span>
          <span class="line"><span id="js-line2"></span> <span class="accent" id="js-accent"></span></span>
        </h2>
        <p class="sub" id="js-sub"></p>
      </div>

      <!-- Pure-CSS laptop mockup -->
      <div class="mockup-wrap scale-in">
        <div class="badge b1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span id="js-badge1"></span>
        </div>
        <div class="badge b2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
          <span id="js-badge2"></span>
        </div>

        <div class="laptop">
          <div class="laptop-screen">
            <div class="screen-bar">
              <span class="d r"></span><span class="d y"></span><span class="d g"></span>
              <span class="url"></span>
            </div>
            <div class="screen-inner">
              <div class="screen-logo">
                <div class="mark">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 4.5-9 4.5-9-4.5L12 3z"/><path d="M21 12l-9 4.5L3 12"/><path d="M21 16.5L12 21 3 16.5"/></svg>
                </div>
                <div class="brand" id="js-screen-brand"></div>
                <div class="tag">Learn · Build · Launch</div>
              </div>
            </div>
          </div>
          <div class="laptop-base"></div>
        </div>
      </div>

      <!-- 4 feature cards 2x2 -->
      <div class="features" id="features"></div>

      <!-- CTA + countdown -->
      <div class="cta-block reveal">
        <button class="cta-btn" id="js-cta"></button>
        <div class="urgency" id="js-urgency"></div>
        <div class="countdown">
          <div class="cd-box"><div class="num" id="cd">00</div><div class="lbl">Days</div></div>
          <div class="cd-box"><div class="num" id="ch">00</div><div class="lbl">Hours</div></div>
          <div class="cd-box"><div class="num" id="cm">00</div><div class="lbl">Mins</div></div>
          <div class="cd-box"><div class="num" id="cs">00</div><div class="lbl">Secs</div></div>
        </div>
      </div>
    </div>
  </section>

<script>
  /* === CLIENT VARIABLES — EDIT HERE === */
  const BRAND_NAME = "AI Academy";
  const LABEL      = "INTRODUCING THE AI ACADEMY";
  const H2_LINE_1  = "Courses, Community, Coaching +";
  const H2_LINE_2  = "Resources to";
  const H2_ACCENT  = "Succeed Online";
  const SUB        = "Masterclasses, tutorials, live buildouts, templates, prompts, coaching calls and more.";
  const BADGE_1    = "Vibe Code Prompts";
  const BADGE_2    = "Remix Templates";
  const CARDS = [
    { icon:"ti-video",      title:"The Masterclass Library", body:"Over 50+ hours of step-by-step video training covering everything from basic prompting to building complex AI SaaS." },
    { icon:"ti-terminal-2", title:"Live Vibe Coding",        body:"Weekly live sessions where you watch me build real, profitable apps from scratch." },
    { icon:"ti-template",   title:"Remix Templates",         body:"Clone and ship ready-made businesses with our plug-and-play template library." },
    { icon:"ti-users",      title:"Private VIP Community",    body:"Network, collaborate, and get direct support from me and other 6 & 7-figure builders.", highlight:true }
  ];
  const CTA_TEXT    = "Join AI Academy — 40% OFF";
  const URGENCY     = "PRICE GOING UP JUNE 7TH";
  const DEADLINE    = "2026-08-01T23:59:59";

  /* === Inline SVG icons (Tabler names rendered as matching line SVGs) === */
  const ICONS = {
    'ti-video':      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="14" height="14" rx="2"/><path d="M16 9l6-3v12l-6-3z"/></svg>',
    'ti-terminal-2': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3"/><line x1="12" y1="15" x2="16" y2="15"/></svg>',
    'ti-template':   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="9" x2="9" y2="21"/></svg>',
    'ti-users':      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'
  };

  /* === Render copy === */
  document.getElementById('js-label').textContent        = LABEL;
  document.getElementById('js-line1').textContent         = H2_LINE_1;
  document.getElementById('js-line2').textContent         = H2_LINE_2;
  document.getElementById('js-accent').textContent        = H2_ACCENT;
  document.getElementById('js-sub').textContent           = SUB;
  document.getElementById('js-badge1').textContent        = BADGE_1;
  document.getElementById('js-badge2').textContent        = BADGE_2;
  document.getElementById('js-screen-brand').textContent  = BRAND_NAME;
  document.getElementById('js-cta').textContent           = CTA_TEXT;
  document.getElementById('js-urgency').textContent       = URGENCY;

  /* === Build feature cards === */
  const featuresEl = document.getElementById('features');
  CARDS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'feature reveal delay-' + (i + 1) + (c.highlight ? ' highlight' : '');
    div.innerHTML =
      '<div class="f-ico">' + (ICONS[c.icon] || '') + '</div>' +
      '<div class="f-title"></div>' +
      '<div class="f-body"></div>';
    div.querySelector('.f-title').textContent = c.title;
    div.querySelector('.f-body').textContent  = c.body;
    featuresEl.appendChild(div);
  });

  /* === Reusable countdown === */
  function initCountdown(deadline, ids) {
    const pad = n => String(n).padStart(2,'0');
    const tick = () => {
      const diff = new Date(deadline) - new Date();
      if (diff <= 0) return;
      const d = Math.floor(diff/86400000);
      const h = Math.floor(diff%86400000/3600000);
      const m = Math.floor(diff%3600000/60000);
      const s = Math.floor(diff%60000/1000);
      const el = id => document.getElementById(id);
      if (el(ids.d)) el(ids.d).textContent = pad(d);
      if (el(ids.h)) el(ids.h).textContent = pad(h);
      if (el(ids.m)) el(ids.m).textContent = pad(m);
      if (el(ids.s)) el(ids.s).textContent = pad(s);
    };
    tick();
    setInterval(tick, 1000);
  }
  initCountdown(DEADLINE, {d:'cd',h:'ch',m:'cm',s:'cs'});

  /* === Scroll reveal === */
  const observer = new IntersectionObserver(
    entries => entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    }), { threshold: 0.15 }
  );
  document.querySelectorAll('.reveal, .scale-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
