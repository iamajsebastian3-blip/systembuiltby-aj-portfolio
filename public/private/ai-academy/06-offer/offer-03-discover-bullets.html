<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Academy — Discover Bullets</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #030110;
    --accent: #6366F1;
    --text: #FFFFFF;
    --muted: rgba(255, 255, 255, 0.5);
    --border: rgba(255, 255, 255, 0.08);
    --card: rgba(255, 255, 255, 0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  .section {
    position: relative;
    width: 100%;
    padding: 96px 24px;
    background:
      radial-gradient(900px 520px at 50% -5%, rgba(99, 102, 241, 0.12), transparent 70%),
      var(--bg);
    overflow: hidden;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Header */
  .label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    margin-bottom: 24px;
  }
  .label .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }

  .heading {
    text-align: center;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(28px, 4.6vw, 42px);
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--text);
    max-width: 640px;
    margin-bottom: 48px;
  }
  .heading .em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    color: var(--accent);
  }

  /* Bullets grid */
  .bullets {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    width: 100%;
  }
  .bullet {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--card);
    border: 0.5px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 16px 18px;
    transition: border-color 0.25s ease, background 0.25s ease, transform 0.2s ease;
  }
  .bullet:hover {
    border-color: rgba(99, 102, 241, 0.35);
    background: rgba(99, 102, 241, 0.05);
    transform: translateY(-2px);
  }
  .bullet .ic {
    flex: 0 0 auto;
    color: var(--accent);
    margin-top: 1px;
  }
  .bullet .txt {
    font-size: 14px;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.7);
  }

  /* CTA + countdown */
  .cta-block {
    text-align: center;
    margin-top: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cta {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 16px;
    color: var(--text);
    background: #1A1835;
    border: 1px solid rgba(99, 102, 241, 0.5);
    border-radius: 999px;
    padding: 17px 40px;
    text-decoration: none;
    cursor: pointer;
    transition: box-shadow 0.3s ease, transform 0.15s ease, background 0.3s ease;
  }
  .cta:hover {
    background: #211e44;
    box-shadow: 0 0 30px rgba(99, 102, 241, 0.5);
    transform: translateY(-1px);
  }

  .urgency {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 18px 0 14px;
  }
  .timer {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .timer .box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 0 8px;
    min-width: 64px;
  }
  .timer .num {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 28px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    color: var(--text);
  }
  .timer .unit {
    display: block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal.delay-1 { transition-delay: 0.1s; }
  .reveal.delay-2 { transition-delay: 0.2s; }
  .reveal.delay-3 { transition-delay: 0.3s; }
  .reveal.delay-4 { transition-delay: 0.4s; }

  @media (max-width: 768px) {
    .section { padding: 64px 18px; }
    .bullets { grid-template-columns: 1fr; }
    .timer .box { min-width: 0; flex: 1; }
  }
</style>
</head>
<body>
  <section class="section">
    <div class="wrap">
      <span class="label reveal"><span class="dot"></span>WHAT'S INSIDE</span>

      <h2 class="heading reveal delay-1" id="heading"></h2>

      <div class="bullets" id="bullets"></div>

      <div class="cta-block">
        <a class="cta reveal" id="cta" href="#join"></a>
        <div class="urgency reveal delay-1" id="urgency"></div>
        <div class="timer reveal delay-2">
          <div class="box"><span class="num" id="o3d">00</span><span class="unit">Days</span></div>
          <div class="box"><span class="num" id="o3h">00</span><span class="unit">Hrs</span></div>
          <div class="box"><span class="num" id="o3m">00</span><span class="unit">Min</span></div>
          <div class="box"><span class="num" id="o3s">00</span><span class="unit">Sec</span></div>
        </div>
      </div>
    </div>
  </section>

<script>
  /* === CLIENT VARIABLES — EDIT HERE === */
  const H2 = "Just a taste of what you'll discover...";
  const BULLETS = [
    { icon: "ti-trending-up",   text: "The exact 4-step framework I use to run a 7-figure business solo." },
    { icon: "ti-gift",          text: "How to design irresistible offers using the Offer Quadrant." },
    { icon: "ti-layers",        text: "The 6 secret layers of AI Infra to automate your entire workflow." },
    { icon: "ti-award",         text: "Which of the 3 levels of Vibe Coders are you? How to reach the top 1%." },
    { icon: "ti-device-mobile", text: "Behind-the-scenes teardown of my custom Solopreneur OS App." },
    { icon: "ti-file-text",     text: "Copy-paste master prompts I use for high-converting copy." },
    { icon: "ti-player-play",   text: "Watch me build a profitable SaaS in a live vibe coding session." },
    { icon: "ti-funnel",        text: "How to prompt AI to build entire sales funnels in minutes." },
    { icon: "ti-bolt",          text: "Steal my top 20 high-income skills and let AI execute them for you." },
    { icon: "ti-coin",          text: "My process for churning out digital assets that generate passive income." }
  ];
  const CTA_TEXT = "Join AI Academy — 40% OFF";
  const URGENCY  = "PRICE GOING UP JUNE 7TH";
  const DEADLINE = "2026-08-01T23:59:59";

  /* Inline SVG icon set — each visually matches its Tabler name */
  const ICONS = {
    "ti-trending-up":   '<path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/>',
    "ti-gift":          '<rect x="3" y="8" width="18" height="4" rx="1"/><path d="M5 12v8h14v-8"/><path d="M12 8v12"/><path d="M12 8C12 8 11 3 8.5 3S6 6 7 7s5 1 5 1zM12 8c0 0 1-5 3.5-5S18 6 17 7s-5 1-5 1z"/>',
    "ti-layers":        '<path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 16.5l9 5 9-5"/>',
    "ti-award":         '<circle cx="12" cy="9" r="6"/><path d="M9 14.5l-1.5 7L12 19l4.5 2.5L15 14.5"/>',
    "ti-device-mobile": '<rect x="7" y="3" width="10" height="18" rx="2"/><line x1="11" y1="18" x2="13" y2="18"/>',
    "ti-file-text":     '<path d="M14 3v5h5"/><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/>',
    "ti-player-play":   '<path d="M7 4v16l13-8z"/>',
    "ti-funnel":        '<path d="M4 4h16l-6 8v6l-4 2v-8z"/>',
    "ti-bolt":          '<path d="M13 3L4 14h7l-1 7 9-11h-7z"/>',
    "ti-coin":          '<circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 0 1 2.5-2c1.5 0 2.5 1 2.5 2.2 0 2-3 1.8-3 3.6 0 1.2 1 2.2 2.5 2.2a2.5 2.5 0 0 0 2.5-2"/><line x1="12" y1="5.5" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="18.5"/>'
  };
  const svg = name =>
    '<svg class="ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' +
    (ICONS[name] || ICONS["ti-bolt"]) + '</svg>';

  /* Render copy */
  document.getElementById('heading').innerHTML = H2.replace("discover", '<span class="em">discover</span>');
  document.getElementById('cta').textContent   = CTA_TEXT;
  document.getElementById('urgency').textContent = URGENCY;

  const grid = document.getElementById('bullets');
  BULLETS.forEach((b, i) => {
    const cell = document.createElement('div');
    cell.className = 'bullet reveal delay-' + ((i % 4) + 1);
    cell.innerHTML = svg(b.icon) + '<span class="txt"></span>';
    cell.querySelector('.txt').textContent = b.text;
    grid.appendChild(cell);
  });

  /* Reusable countdown */
  function initCountdown(deadline, ids) {
    const pad = n => String(n).padStart(2, '0');
    const tick = () => {
      const diff = new Date(deadline) - new Date();
      if (diff <= 0) return;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor(diff % 86400000 / 3600000);
      const m = Math.floor(diff % 3600000 / 60000);
      const s = Math.floor(diff % 60000 / 1000);
      const el = id => document.getElementById(id);
      if (el(ids.d)) el(ids.d).textContent = pad(d);
      if (el(ids.h)) el(ids.h).textContent = pad(h);
      if (el(ids.m)) el(ids.m).textContent = pad(m);
      if (el(ids.s)) el(ids.s).textContent = pad(s);
    };
    tick();
    setInterval(tick, 1000);
  }
  initCountdown(DEADLINE, { d: 'o3d', h: 'o3h', m: 'o3m', s: 'o3s' });

  /* Reusable scroll reveal */
  const observer = new IntersectionObserver(
    entries => entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    }), { threshold: 0.15 }
  );
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
