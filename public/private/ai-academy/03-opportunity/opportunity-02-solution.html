<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Academy — 3-Step Method Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:     #030110;
    --accent: #6366F1;
    --text:   #FFFFFF;
    --muted:  rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.08);
    --card:   rgba(255,255,255,0.03);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 72px 24px;
  }

  .section {
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---- header ---- */
  .header {
    text-align: center;
    margin-bottom: 52px;
  }
  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 16px;
  }
  h2 {
    font-weight: 700;
    font-size: clamp(30px, 4.4vw, 46px);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  h2 .line-1 { color: var(--text); display: block; }
  h2 .accent {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    color: var(--accent);
    font-size: clamp(34px, 5vw, 54px);
    letter-spacing: 0;
  }

  /* ---- cards ---- */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
  }
  .card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 24px;
    transition: border-color 0.28s ease, transform 0.28s ease, background 0.28s ease;
  }
  .card:hover {
    border-color: rgba(99,102,241,0.3);
    background: rgba(99,102,241,0.04);
    transform: translateY(-2px);
  }
  .card-icon {
    color: var(--accent);
    margin-bottom: 18px;
  }
  .card-icon svg { width: 28px; height: 28px; }
  .card-num {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .card-body {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ---- scroll reveal ---- */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ---- MOBILE ---- */
  @media (max-width: 768px) {
    body { padding: 48px 18px; }
    .header { margin-bottom: 36px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <section class="section">
    <div class="header">
      <p class="label reveal" id="label"></p>
      <h2 class="reveal">
        <span class="line-1" id="h2Line1"></span>
        <span class="accent" id="h2Accent"></span>
      </h2>
    </div>
    <div class="cards" id="cards"></div>
  </section>

<script>
  /* === CLIENT VARIABLES — EDIT HERE === */
  const LABEL      = "THE SOLUTION";
  const H2_LINE_1  = "The best way to";
  const H2_ACCENT  = "mastering AI";
  const CARDS = [
    { icon:"ti-school",  num:"01", title:"Learn from real experts", body:"Watch over-the-shoulder as we build real businesses, software, and systems from scratch." },
    { icon:"ti-layers",  num:"02", title:"Model what they do",      body:"See the exact prompts, workflows, and strategies we use to generate revenue." },
    { icon:"ti-copy",    num:"03", title:"Copy their templates",    body:"Don't start from scratch. Use our proven, plug-and-play templates to launch faster." }
  ];

  /* ---- inline SVG icons matching the ti-* names ---- */
  const ICONS = {
    'ti-school': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 9 12 5 2 9l10 4 10-4Z"/><path d="M6 10.6V16c0 1.1 2.7 2 6 2s6-.9 6-2v-5.4"/><path d="M22 9v5"/></svg>`,
    'ti-layers': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 8l10 5 10-5-10-5Z"/><path d="m2 13 10 5 10-5"/><path d="m2 18 10 5 10-5"/></svg>`,
    'ti-copy': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`
  };
  const FALLBACK_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>`;

  /* ---- render copy ---- */
  document.getElementById('label').textContent = LABEL;
  document.getElementById('h2Line1').textContent = H2_LINE_1;
  document.getElementById('h2Accent').textContent = H2_ACCENT;

  const cardsWrap = document.getElementById('cards');
  CARDS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'card reveal';
    card.style.transitionDelay = (0.12 * i) + 's';
    card.innerHTML = `
      <div class="card-icon">${ICONS[c.icon] || FALLBACK_ICON}</div>
      <div class="card-num">${c.num}</div>
      <h3 class="card-title">${c.title}</h3>
      <p class="card-body">${c.body}</p>`;
    cardsWrap.appendChild(card);
  });

  /* ---- scroll reveal ---- */
  const observer = new IntersectionObserver(
    entries => entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); }
    }), { threshold: 0.15 }
  );
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
