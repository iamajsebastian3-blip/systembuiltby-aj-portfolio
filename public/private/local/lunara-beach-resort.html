<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lunara Beach Resort — Island Life, Redefined.</title>
<meta name="description" content="A private beach escape in the Philippines where crystal-clear waters, warm hospitality, and unforgettable moments await." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root{
  --primary:       #1B3A2D;
  --primary-dark:  #142d22;
  --accent:        #C9A96E;
  --accent-dark:   #B8904F;
  --bg-white:      #FFFFFF;
  --bg-cream:      #F9F6F0;
  --bg-light:      #F2EEE8;
  --text-dark:     #1A1A1A;
  --text-muted:    #6B6B6B;
  --text-light:    rgba(255,255,255,0.75);
}

*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{
  font-family:'Inter', sans-serif;
  color:var(--text-dark);
  background:var(--bg-white);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}
img{ display:block; max-width:100%; }
a{ text-decoration:none; color:inherit; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; }
ul{ list-style:none; }

h1,h2,h3,h4,h5{ font-family:'Playfair Display', serif; font-weight:600; color:var(--text-dark); line-height:1.15; letter-spacing:-0.01em; }

.container{ max-width:1280px; margin:0 auto; padding:0 32px; }
.eyebrow{
  font-family:'Inter', sans-serif;
  font-size:12px;
  font-weight:500;
  letter-spacing:0.32em;
  text-transform:uppercase;
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  gap:10px;
}
.eyebrow.with-dash::before{
  content:"";
  display:inline-block;
  width:32px;
  height:1px;
  background:var(--accent);
}

/* ===== Reveal animations ===== */
.reveal{
  opacity:0;
  transform:translateY(36px);
  transition:opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.reveal.visible{ opacity:1; transform:translateY(0); }
.delay-1{ transition-delay:.1s; }
.delay-2{ transition-delay:.2s; }
.delay-3{ transition-delay:.3s; }
.delay-4{ transition-delay:.4s; }
.delay-5{ transition-delay:.5s; }
.reveal.scale-in{ transform:translateY(36px) scale(.95); }
.reveal.scale-in.visible{ transform:translateY(0) scale(1); }

/* =========================================
   SECTION 01 — NAVIGATION
   ========================================= */
.nav{
  position:fixed; top:0; left:0; right:0;
  height:80px;
  z-index:1000;
  display:flex; align-items:center;
  transition:background .3s ease, box-shadow .3s ease;
  background:transparent;
}
.nav.scrolled{ background:#fff; box-shadow:0 4px 20px rgba(0,0,0,.06); }
.nav.scrolled .nav-link{ color:var(--text-dark); }
.nav.scrolled .nav-brand-name{ color:var(--text-dark); }
.nav.scrolled .nav-brand-sub{ color:var(--text-muted); }
.nav.scrolled .nav-logo-icon{ color:var(--primary); }
.nav.scrolled .nav-hamburger span{ background:var(--text-dark); }

.nav-inner{
  max-width:1400px; width:100%;
  margin:0 auto; padding:0 40px;
  display:flex; align-items:center; justify-content:space-between;
}
.nav-brand{ display:flex; align-items:center; gap:12px; }
.nav-logo-icon{
  font-size:28px; color:#fff;
  transition:color .3s ease;
}
.nav-brand-text{ display:flex; flex-direction:column; line-height:1.1; }
.nav-brand-name{
  font-family:'Playfair Display', serif;
  font-weight:700; font-size:22px; color:#fff;
  letter-spacing:1px;
  transition:color .3s ease;
}
.nav-brand-sub{
  font-family:'Inter', sans-serif;
  font-size:9px; color:rgba(255,255,255,.7);
  letter-spacing:2px; margin-top:2px;
  transition:color .3s ease;
}

.nav-links{ display:flex; gap:36px; }
.nav-link{
  font-family:'Inter', sans-serif;
  font-size:13px; font-weight:500;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#fff;
  position:relative;
  padding:6px 0;
  transition:color .3s ease;
}
.nav-link{ cursor:pointer; }
.nav-link::after{
  content:""; position:absolute; left:0; bottom:0;
  width:0; height:1px; background:var(--accent);
  transform-origin:left center;
  transition:width .3s ease;
}
.nav-link:hover{ color:var(--accent); }
.nav-link:hover::after{ width:100%; }
.nav-link.active{ color:var(--accent); }
.nav-link.active::after{ width:100%; }

.nav-right{ display:flex; align-items:center; gap:18px; }
.btn-nav-cta{
  background:var(--accent);
  color:#fff;
  padding:12px 24px;
  border-radius:30px;
  font-size:12px; font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .3s ease, transform .25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s ease;
}
.btn-nav-cta:hover{ background:var(--accent-dark); transform:translateY(-2px); box-shadow:0 10px 24px rgba(201,169,110,.35); }
.btn-nav-cta:active{ transform:scale(.97); }

.nav-hamburger{
  display:none;
  flex-direction:column; gap:5px;
  padding:8px; cursor:pointer;
  z-index:1100;
}
.nav-hamburger span{
  display:block; width:24px; height:2px;
  background:#fff;
  transition:transform .3s ease, opacity .3s ease, background .3s ease;
}
.nav-hamburger.open span{ background:#fff; }
.nav-hamburger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2){ opacity:0; }
.nav-hamburger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

.mobile-menu{
  position:fixed; inset:0;
  background:var(--primary-dark);
  z-index:1050;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:28px;
  opacity:0; pointer-events:none;
  transition:opacity .35s ease;
}
.mobile-menu.open{ opacity:1; pointer-events:auto; }
.mobile-menu a{
  font-family:'Playfair Display', serif;
  font-size:28px; color:#fff;
  letter-spacing:1px;
}
.mobile-menu a:hover{ color:var(--accent); }
.mobile-menu .btn-nav-cta{ margin-top:14px; }

/* =========================================
   SECTION 02 — HERO
   ========================================= */
.hero{
  position:relative;
  min-height:100vh;
  display:flex; align-items:center;
  color:#fff;
  overflow:hidden;
  isolation:isolate;
}
.hero-bg{
  position:absolute; inset:0;
  background-image:url('https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=1920&q=80');
  background-size:cover;
  background-position:center;
  transform:scale(1);
  animation:kenBurns 20s ease-out infinite alternate;
  z-index:-2;
}
.hero-overlay{
  position:absolute; inset:0;
  background:linear-gradient(to right, rgba(27,58,45,0.85) 0%, rgba(27,58,45,0.3) 60%, transparent 100%);
  z-index:-1;
}
@keyframes kenBurns{
  from{ transform:scale(1); }
  to  { transform:scale(1.08); }
}
.hero-inner{
  width:100%;
  padding:120px 8% 80px;
  max-width:1500px;
}
.hero-content{ max-width:640px; }
.hero-eyebrow{
  color:var(--accent);
  font-family:'Inter', sans-serif;
  font-size:clamp(11px, 1vw, 14px);
  letter-spacing:0.36em;
  text-transform:uppercase;
  margin-bottom:28px;
  display:inline-flex; align-items:center; gap:14px;
  opacity:0; transform:translateY(20px);
  animation:heroFade .9s cubic-bezier(0.16, 1, 0.3, 1) forwards .12s;
}
.hero-eyebrow::before{
  content:"";
  width:36px; height:1px; background:var(--accent);
}
.hero-title{
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:clamp(56px, 9vw, 112px);
  line-height:1.02;
  letter-spacing:-0.02em;
  color:#fff;
  margin-bottom:30px;
  white-space:pre-line;
  opacity:0; transform:translateY(20px);
  animation:heroFade .9s cubic-bezier(0.16, 1, 0.3, 1) forwards .24s;
}
.hero-sub{
  font-family:'Inter', sans-serif;
  font-size:clamp(16px, 1.3vw, 20px);
  line-height:1.65;
  color:rgba(255,255,255,.85);
  max-width:480px;
  margin-bottom:40px;
  opacity:0; transform:translateY(20px);
  animation:heroFade .9s cubic-bezier(0.16, 1, 0.3, 1) forwards .36s;
}
.hero-ctas{
  display:flex; flex-wrap:wrap; gap:14px;
  opacity:0; transform:translateY(20px);
  animation:heroFade .9s cubic-bezier(0.16, 1, 0.3, 1) forwards .48s;
}
.btn-primary{
  background:var(--accent);
  color:var(--primary-dark);
  padding:18px 36px;
  border-radius:40px;
  font-family:'Inter', sans-serif;
  font-size:14px; font-weight:600;
  letter-spacing:0.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .3s ease, transform .35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .35s ease;
  display:inline-flex; align-items:center; gap:10px;
}
.btn-primary i{ transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1); font-size:16px; }
.btn-primary:hover{ background:#fff; transform:translateY(-2px); box-shadow:0 14px 30px rgba(0,0,0,.18); }
.btn-primary:hover i{ transform:translateX(4px); }
.btn-primary:active{ transform:scale(.97); }
.btn-secondary{
  background:transparent;
  color:#fff;
  border:1.5px solid rgba(255,255,255,.6);
  padding:16.5px 34px;
  border-radius:40px;
  font-family:'Inter', sans-serif;
  font-size:14px; font-weight:500;
  letter-spacing:0.14em;
  text-transform:uppercase;
  display:inline-flex; align-items:center; gap:10px;
  cursor:pointer;
  transition:background .3s ease, border-color .3s ease, transform .35s cubic-bezier(0.16, 1, 0.3, 1);
}
.btn-secondary:hover{ background:rgba(255,255,255,.12); border-color:#fff; transform:translateY(-2px); }
.btn-secondary:active{ transform:scale(.97); }
.btn-secondary i{ font-size:16px; }

@keyframes heroFade{
  to{ opacity:1; transform:translateY(0); }
}

.hero-card{
  position:absolute;
  bottom:50px; right:50px;
  background:rgba(27,58,45,.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:28px;
  width:340px;
  display:flex; flex-direction:column; gap:18px;
  opacity:0; transform:translateY(20px);
  animation:heroFade .9s cubic-bezier(0.16, 1, 0.3, 1) forwards .8s, heroFloat 4s ease-in-out 1.8s infinite;
}
@keyframes heroFloat{
  0%, 100% { transform:translateY(0); }
  50%      { transform:translateY(-6px); }
}
.hero-feature{
  display:flex; align-items:flex-start; gap:14px;
}
.hero-feature i{
  color:var(--accent);
  font-size:24px;
  flex-shrink:0;
  margin-top:2px;
}
.hero-feature-text h4{
  font-family:'Inter', sans-serif;
  font-size:11px; font-weight:600;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#fff;
  margin-bottom:4px;
}
.hero-feature-text p{
  font-family:'Inter', sans-serif;
  font-size:12.5px;
  line-height:1.5;
  color:rgba(255,255,255,.65);
}

/* =========================================
   SECTION 03 — ABOUT
   ========================================= */
.about{
  background:var(--bg-cream);
  padding:120px 0;
  position:relative;
  overflow:hidden;
}
.about-grid{
  display:grid;
  grid-template-columns:45% 55%;
  gap:80px;
  align-items:center;
}
.about-left{ position:relative; }
.about-headline{
  font-family:'Playfair Display', serif;
  font-weight:600;
  font-size:clamp(40px, 5.5vw, 72px);
  line-height:1.08;
  color:var(--text-dark);
  margin:22px 0 32px;
  white-space:pre-line;
  letter-spacing:-0.015em;
}
.about-body{
  font-family:'Inter', sans-serif;
  font-size:17px;
  line-height:1.85;
  color:var(--text-muted);
  margin-bottom:32px;
}
.about-quote{
  font-family:'Dancing Script', cursive;
  font-size:clamp(24px, 2.6vw, 36px);
  color:var(--primary);
  line-height:1.4;
  white-space:pre-line;
  position:relative;
  padding-left:22px;
  border-left:2px solid var(--accent);
}
.about-watermark{
  position:absolute;
  bottom:-30px; left:-20px;
  font-size:140px;
  color:var(--accent);
  opacity:.07;
  pointer-events:none;
}

.about-photos{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:16px;
  height:560px;
}
.about-photo{
  border-radius:14px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
}
.about-photo img{
  width:100%; height:100%;
  object-fit:cover;
  transition:transform .6s ease, filter .6s ease;
}
.about-photo:hover img{ transform:scale(1.05); filter:brightness(1.08); }
.about-photo-1{ grid-row:1 / 3; }
.about-photo-2{ grid-column:2; grid-row:1; }
.about-photo-3{ grid-column:2; grid-row:2; }

/* =========================================
   SECTION 04 — FEATURES
   ========================================= */
.features{
  background:var(--bg-light);
  padding:120px 0;
  text-align:center;
}
.features-header{
  max-width:640px;
  margin:0 auto 70px;
}
.features-headline{
  font-family:'Playfair Display', serif;
  font-weight:600;
  font-size:clamp(40px, 5.5vw, 72px);
  margin-top:22px;
  white-space:pre-line;
  line-height:1.08;
  letter-spacing:-0.015em;
}
.features-grid{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:32px;
}
.feature-item{
  text-align:center;
  padding:24px 12px;
  cursor:pointer;
  transition:transform .4s cubic-bezier(0.16, 1, 0.3, 1);
}
.feature-item:hover{ transform:translateY(-6px); }
.feature-item:hover .feature-icon{ transform:scale(1.1); }
.feature-icon{
  font-size:42px;
  color:var(--accent);
  margin-bottom:22px;
  display:block;
  transition:transform .4s cubic-bezier(0.16, 1, 0.3, 1);
}
.feature-title{
  font-family:'Inter', sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--text-dark);
  margin-bottom:14px;
}
.feature-body{
  font-family:'Inter', sans-serif;
  font-size:14.5px;
  line-height:1.7;
  color:var(--text-muted);
}

/* =========================================
   SECTION 05 — ACCOMMODATIONS
   ========================================= */
.rooms{
  background:#fff;
  padding:120px 0;
}
.rooms-head{
  display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:56px; gap:24px; flex-wrap:wrap;
}
.rooms-head-left{ max-width:560px; }
.rooms-headline{
  font-family:'Playfair Display', serif;
  font-weight:600;
  font-size:clamp(40px, 5.5vw, 72px);
  margin-top:18px;
  line-height:1.08;
  letter-spacing:-0.015em;
}
.rooms-arrows{ display:flex; gap:14px; }
.arrow-btn{
  width:48px; height:48px;
  border-radius:50%;
  background:var(--primary);
  color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:background .3s cubic-bezier(0.16, 1, 0.3, 1), transform .3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s ease;
}
.arrow-btn:hover{ background:var(--accent); transform:scale(1.1); box-shadow:0 10px 24px rgba(201,169,110,.35); }
.arrow-btn:active{ transform:scale(.96); }

.rooms-viewport{ overflow:hidden; }
.rooms-track{
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:28px;
  transition:transform .5s ease;
}
.room-card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.05);
  border:1px solid transparent;
  cursor:pointer;
  transition:transform .4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .4s cubic-bezier(0.16, 1, 0.3, 1), border-color .4s cubic-bezier(0.16, 1, 0.3, 1);
}
.room-card:hover{
  transform:translateY(-6px);
  box-shadow:0 24px 60px rgba(0,0,0,0.18);
  border:1px solid rgba(201,169,110,0.35);
}
.room-img{
  width:100%; height:230px;
  overflow:hidden;
}
.room-img img{
  width:100%; height:100%;
  object-fit:cover;
  transition:transform .6s ease, filter .6s ease;
}
.room-card:hover .room-img img{ transform:scale(1.05); filter:brightness(1.08); }
.room-body{ padding:26px 24px 30px; }
.room-name{
  font-family:'Playfair Display', serif;
  font-weight:600;
  font-size:22px;
  color:var(--text-dark);
  margin-bottom:12px;
  letter-spacing:-0.01em;
}
.room-desc{
  font-family:'Inter', sans-serif;
  font-size:14.5px;
  color:var(--text-muted);
  line-height:1.65;
  margin-bottom:18px;
}
.room-price{
  font-family:'Inter', sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.1em;
  color:var(--accent);
}

.rooms-cta-wrap{ text-align:center; margin-top:56px; }
.btn-rooms-cta{
  display:inline-flex; align-items:center; gap:10px;
  background:var(--primary);
  color:#fff;
  padding:18px 38px;
  border-radius:40px;
  font-family:'Inter', sans-serif;
  font-size:13px; font-weight:600;
  letter-spacing:0.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .3s ease, transform .35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .35s ease;
}
.btn-rooms-cta i{ transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1); font-size:16px; }
.btn-rooms-cta:hover{ background:var(--accent); transform:translateY(-2px); box-shadow:0 14px 30px rgba(0,0,0,.18); }
.btn-rooms-cta:hover i{ transform:translateX(4px); }
.btn-rooms-cta:active{ transform:scale(.97); }

/* =========================================
   SECTION 06 — SPECIAL OFFER
   ========================================= */
.offer{
  background:var(--primary);
  position:relative;
  overflow:hidden;
}
.offer-grid{
  display:grid;
  grid-template-columns:40% 60%;
  align-items:stretch;
  min-height:480px;
  position:relative;
}
.offer-left{
  padding:80px 60px;
  display:flex; flex-direction:column; justify-content:center;
}
.offer-headline{
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:clamp(40px, 5.5vw, 72px);
  color:#fff;
  margin:22px 0 26px;
  line-height:1.08;
  letter-spacing:-0.015em;
  white-space:pre-line;
}
.offer-body{
  font-family:'Inter', sans-serif;
  font-size:17px;
  color:rgba(255,255,255,.78);
  line-height:1.7;
  margin-bottom:34px;
  max-width:400px;
}
.btn-offer{
  align-self:flex-start;
  display:inline-flex; align-items:center; gap:10px;
  background:var(--accent);
  color:var(--primary-dark);
  padding:17px 34px;
  border-radius:40px;
  font-family:'Inter', sans-serif;
  font-size:13px; font-weight:600;
  letter-spacing:0.14em;
  text-transform:uppercase;
  cursor:pointer;
  transition:background .3s ease, transform .35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .35s ease;
}
.btn-offer i{ transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1); font-size:16px; }
.btn-offer:hover{ background:#fff; transform:translateY(-2px); box-shadow:0 14px 30px rgba(0,0,0,.25); }
.btn-offer:hover i{ transform:translateX(4px); }
.btn-offer:active{ transform:scale(.97); }

.offer-right{
  position:relative;
  overflow:hidden;
}
.offer-right::after{
  content:""; position:absolute; inset:0;
  background:linear-gradient(to right, rgba(27,58,45,.5) 0%, rgba(27,58,45,.1) 40%, transparent 100%);
}
.offer-right img{
  width:100%; height:100%;
  object-fit:cover;
}

.offer-badge{
  position:absolute;
  top:50%; left:40%;
  transform:translate(-50%, -50%);
  width:190px; height:190px;
  border-radius:50%;
  background:var(--primary-dark);
  border:3px solid var(--accent);
  color:#fff;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:2;
  box-shadow:0 14px 40px rgba(0,0,0,.3), 0 0 0 rgba(201,169,110,0.4);
  animation:badgePulse 2.5s ease-in-out infinite alternate;
}
@keyframes badgePulse{

  { quote:"Lunara is truly a slice of paradise! The staff were amazing and the views are unforgettable.", avatar:"https://i.pravatar.cc/80?img=1", name:"Andrea M.",     location:"Manila, Philippines" },
  { quote:"We celebrated our anniversary here and it was perfect in every way. We'll definitely be back!", avatar:"https://i.pravatar.cc/80?img=3", name:"Jason & Lara",  location:"Cebu, Philippines" },

const SOCIAL_HEADLINE = "Share Every\nMoment";

const FOLLOW_BTN      = "Follow Us";
const SOCIAL_PHOTOS   = [
  "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&q=80",

  "https://images.unsplash.com/photo-1516738901171-8eb4fc13bd20?w=400&q=80"
];

/* ——— FOOTER ——— */
const FOOTER_TAGLINE  = "A hidden gem in the Philippines where luxury meets nature. Your escape awaits.";
const FOOTER_EXPLORE  = ["About Us","Accommodations","Experiences","Dining","Gallery","Offers","Contact"];
const FOOTER_ADDRESS  = "Sitio Deku, Barangay Poblacion, El Nido, Palawan, Philippines";
const FOOTER_PHONE    = "+63 917 123 4567";

const SOCIAL_LINKS    = { facebook:"#", instagram:"#", tiktok:"#", youtube:"#" };

/* ============ RENDER ============ */
document.getElementById('brand-name').textContent = BRAND_NAME;
document.getElementById('brand-sub').textContent = BRAND_SUBTITLE;
document.getElementById('footer-brand-name').textContent = BRAND_NAME;

/* Nav links */
const navLinksEl = document.getElementById('nav-links');
NAV_LINKS.forEach(l => {
  const a = document.createElement('a');
  a.href = l.href; a.className = 'nav-link'; a.textContent = l.label;
  navLinksEl.appendChild(a);
});
document.getElementById('nav-cta').textContent = CTA_NAV_TEXT;

/* Mobile menu */
const mobileMenu = document.getElementById('mobile-menu');
NAV_LINKS.forEach(l => {
  const a = document.createElement('a');
  a.href = l.href; a.textContent = l.label;
  a.addEventListener('click', () => toggleMobileMenu(false));
  mobileMenu.appendChild(a);
});
const mCta = document.createElement('a');
mCta.href = '#contact'; mCta.className = 'btn-nav-cta'; mCta.textContent = CTA_NAV_TEXT;
mCta.addEventListener('click', () => toggleMobileMenu(false));
mobileMenu.appendChild(mCta);

/* Hero */
const heroBgEl = document.querySelector('.hero-bg');
if (heroBgEl) heroBgEl.style.backgroundImage = `url('${BG_HERO_IMAGE}')`;
document.getElementById('hero-eyebrow').innerHTML = HERO_EYEBROW;
document.getElementById('hero-title').textContent = HERO_HEADLINE;
document.getElementById('hero-sub').textContent = HERO_SUBTEXT;
document.getElementById('hero-cta-primary').innerHTML = `<span>${CTA_PRIMARY}</span><i class="ti ti-arrow-right"></i>`;
const heroSec = document.getElementById('hero-cta-secondary');
heroSec.innerHTML = '<i class="ti ti-player-play"></i> ' + CTA_SECONDARY;

const heroCard = document.getElementById('hero-card');
HERO_FEATURES.forEach(f => {
  const row = document.createElement('div');
  row.className = 'hero-feature';
  row.innerHTML = `
    <i class="ti ${f.icon}"></i>
    <div class="hero-feature-text">
      <h4>${f.title}</h4>
      <p>${f.body}</p>
    </div>`;
  heroCard.appendChild(row);
});

/* About */
document.getElementById('about-label').innerHTML = ABOUT_LABEL;
document.getElementById('about-headline').textContent = ABOUT_HEADLINE;
document.getElementById('about-body').textContent = ABOUT_BODY;
document.getElementById('about-quote').textContent = ABOUT_QUOTE;
document.getElementById('about-photo-1').src = PHOTO_ABOUT_1;
document.getElementById('about-photo-2').src = PHOTO_ABOUT_2;
document.getElementById('about-photo-3').src = PHOTO_ABOUT_3;

/* Features */
document.getElementById('features-label').innerHTML = FEATURES_LABEL;
document.getElementById('features-headline').textContent = FEATURES_HEADLINE;
const featuresGrid = document.getElementById('features-grid');
FEATURES.forEach((f, i) => {
  const item = document.createElement('div');
  item.className = 'feature-item reveal delay-' + ((i % 5) + 1);
  item.innerHTML = `
    <i class="ti ${f.icon} feature-icon"></i>
    <h4 class="feature-title">${f.title}</h4>
    <p class="feature-body">${f.body}</p>`;
  featuresGrid.appendChild(item);
});

/* Rooms */
document.getElementById('rooms-label').innerHTML = ROOMS_LABEL;
document.getElementById('rooms-headline').textContent = ROOMS_HEADLINE;
document.getElementById('rooms-cta').innerHTML = `<span>${ROOMS_CTA}</span><i class="ti ti-arrow-right"></i>`;
const roomsTrack = document.getElementById('rooms-track');
ROOMS.forEach((r, i) => {
  const card = document.createElement('div');
  card.className = 'room-card reveal delay-' + ((i % 4) + 1);
  card.innerHTML = `
    <div class="room-img"><img src="${r.image}" alt="${r.name}" /></div>
    <div class="room-body">
      <h3 class="room-name">${r.name}</h3>
      <p class="room-desc">${r.desc}</p>
      <span class="room-price">${r.price}</span>
    </div>`;
  roomsTrack.appendChild(card);
});

/* Rooms carousel */
let roomsIndex = 0;
const roomsPerView = () => {
  if (window.innerWidth <= 1024 && window.innerWidth > 768) return 3;
  if (window.innerWidth <= 768) return 1;
  return 4;
};
function updateRoomsTransform(){
  if (window.innerWidth <= 768) {
    roomsTrack.style.transform = '';
    return;
  }
  const total = ROOMS.length;
  const per = roomsPerView();
  const max = Math.max(0, total - per);
  if (roomsIndex > max) roomsIndex = max;
  if (roomsIndex < 0) roomsIndex = 0;
  const shift = (100 / per) * roomsIndex;
  roomsTrack.style.transform = `translateX(-${shift}%)`;
}
document.getElementById('rooms-prev').addEventListener('click', () => { roomsIndex--; updateRoomsTransform(); });
document.getElementById('rooms-next').addEventListener('click', () => { roomsIndex++; updateRoomsTransform(); });
window.addEventListener('resize', updateRoomsTransform);

/* Offer */
document.getElementById('offer-label').innerHTML = OFFER_LABEL;
document.getElementById('offer-headline').textContent = OFFER_HEADLINE;
document.getElementById('offer-body').textContent = OFFER_BODY;
document.getElementById('offer-cta').innerHTML = `<span>${OFFER_CTA}</span><i class="ti ti-arrow-right"></i>`;
document.getElementById('offer-discount').textContent = OFFER_DISCOUNT;
document.getElementById('offer-image').src = OFFER_IMAGE;

/* Reviews */
document.getElementById('reviews-headline').textContent = REVIEWS_HEADLINE;
const reviewsTrack = document.getElementById('reviews-track');
REVIEWS.forEach((r, i) => {
  const card = document.createElement('div');
  card.className = 'review-card reveal delay-' + ((i % 3) + 1);
  card.innerHTML = `
    <div class="review-quote-mark">"</div>
    <p class="review-text">${r.quote}</p>
    <div class="review-sep"></div>
    <div class="review-author">
      <div class="review-avatar"><img src="${r.avatar}" alt="${r.name}" /></div>
      <div>
        <div class="review-name">${r.name}</div>
        <div class="review-loc">${r.location}</div>
      </div>
    </div>`;
  reviewsTrack.appendChild(card);
});

/* Reviews carousel */
let reviewsIndex = 0;
const reviewsPerView = () => (window.innerWidth <= 768 ? 1 : 3);
function updateReviewsTransform(){
  const total = REVIEWS.length;
  const per = reviewsPerView();
  const max = Math.max(0, total - per);
  if (reviewsIndex > max) reviewsIndex = max;
  if (reviewsIndex < 0) reviewsIndex = 0;
  const cardWidthPct = 100 / per;
  reviewsTrack.style.transform = `translateX(-${cardWidthPct * reviewsIndex}%)`;
}
document.getElementById('reviews-prev').addEventListener('click', () => { reviewsIndex--; updateReviewsTransform(); });
document.getElementById('reviews-next').addEventListener('click', () => { reviewsIndex++; updateReviewsTransform(); });
window.addEventListener('resize', updateReviewsTransform);

/* ============ INTERACTIONS ============ */
/* Nav scroll state */
const nav = document.getElementById('navbar');
function onScroll(){
  if (window.scrollY > 50) nav.classList.add('scrolled');
  else nav.classList.remove('scrolled');
}
window.addEventListener('scroll', onScroll, { passive:true });
onScroll();

/* Hamburger */
const hamburger = document.getElementById('nav-hamburger');
function toggleMobileMenu(force){
  const open = typeof force === 'boolean' ? force : !mobileMenu.classList.contains('open');
  mobileMenu.classList.toggle('open', open);
  hamburger.classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}
hamburger.addEventListener('click', () => toggleMobileMenu());

/* Newsletter */
const newsletterForm = document.getElementById('newsletter-form');
const newsletterMsg = document.getElementById('newsletter-msg');
newsletterForm.addEventListener('submit', (e) => {
  e.preventDefault();
  newsletterMsg.classList.add('show');
  newsletterForm.reset();
  setTimeout(() => newsletterMsg.classList.remove('show'), 5000);
});

/* IntersectionObserver — reveal */
const revealEls = document.querySelectorAll('.reveal');
const io = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (en.isIntersecting){
      en.target.classList.add('visible');
      io.unobserve(en.target);
    }
  });
}, { threshold:0.12, rootMargin:'0px 0px -40px 0px' });
revealEls.forEach(el => io.observe(el));

/* Active nav link via section observer */
const sections = document.querySelectorAll('section[id], footer[id]');
const navAnchorMap = {};
document.querySelectorAll('.nav-link').forEach(a => {
  navAnchorMap[a.getAttribute('href')] = a;
});
const sectionIO = new IntersectionObserver((entries) => {
  entries.forEach(en => {
    if (en.isIntersecting){
      const id = '#' + en.target.id;
      Object.values(navAnchorMap).forEach(a => a.classList.remove('active'));
      if (navAnchorMap[id]) navAnchorMap[id].classList.add('active');
    }
  });
}, { threshold:0.45 });
sections.forEach(s => sectionIO.observe(s));

/* Init carousels on load */
updateRoomsTransform();
updateReviewsTransform();
</script>
