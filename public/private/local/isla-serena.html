<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Isla Serena Beach Resort — A Hidden Paradise in the Philippines</title>
<meta name="description" content="Isla Serena Beach Resort — a serene beachfront retreat in the Philippines where crystal-clear waters, powdery white sand, and warm Filipino hospitality create unforgettable memories." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root{
  --primary:       #1B4F5C;
  --primary-dark:  #143d47;
  --accent:        #C9A96E;
  --accent-dark:   #B8904F;
  --bg-white:      #FFFFFF;
  --bg-cream:      #F8F5EF;
  --bg-light:      #F2EDE6;
  --text-dark:     #1A1A1A;
  --text-muted:    #6B6B6B;
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-weight: 400;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-dark);
  background: var(--bg-white);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input { font-family: inherit; }

h1, h2, h3, h4 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; color: var(--text-dark); margin: 0; line-height: 1.2; }

/* ——— Reveal animations ——— */
.reveal { opacity: 0; transform: translateY(36px); transition: opacity .8s cubic-bezier(0.16, 1, 0.3, 1), transform .8s cubic-bezier(0.16, 1, 0.3, 1); }
.reveal.visible { opacity: 1; transform: translateY(0); }
.delay-1 { transition-delay: .1s; }
.delay-2 { transition-delay: .2s; }
.delay-3 { transition-delay: .3s; }
.delay-4 { transition-delay: .4s; }

/* ——— Eyebrow ——— */
.eyebrow {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.32em;
  color: var(--accent);
  display: inline-block;
}

/* ——— Shared buttons ——— */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  padding: 16px 32px;
  border-radius: 6px;
  transition: background .35s ease, color .35s ease, border-color .35s ease, transform .35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .35s ease;
  white-space: nowrap;
  cursor: pointer;
  border: none;
}
.btn:active { transform: scale(0.97); }
.btn i, .btn .ti { transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1); }
.btn:hover i.ti-arrow-right, .btn:hover .ti-arrow-right { transform: translateX(4px); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(27,79,92,.28); }
.btn-accent  { background: var(--accent); color: var(--text-dark); }
.btn-accent:hover { background: var(--accent-dark); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(201,169,110,.4); }
.btn-outline { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.8); }
.btn-outline:hover { background: rgba(255,255,255,.12); border-color: #fff; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(255,255,255,.15); }

/* ============================================================
   01 — NAVIGATION
   ============================================================ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 80px;
  z-index: 1000;
  display: flex;
  align-items: center;
  padding: 0 5%;
  transition: background .3s ease, box-shadow .3s ease;
  background: transparent;
}
.nav.scrolled {
  background: #fff;
  box-shadow: 0 4px 30px rgba(0,0,0,.08);
}
.nav-inner { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; }

.nav-brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.nav-brand-icon { color: var(--accent); font-size: 28px; line-height: 1; }
.nav-brand-text { display: flex; flex-direction: column; line-height: 1.1; }
.nav-brand-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 19px; color: #fff; letter-spacing: 1px; transition: color .3s ease; }
.nav-brand-sub  { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,.7); transition: color .3s ease; }
.nav.scrolled .nav-brand-name { color: var(--text-dark); }
.nav.scrolled .nav-brand-sub  { color: var(--text-muted); }

.nav-links {
  list-style: none; display: flex; gap: 32px; margin: 0; padding: 0;
}
.nav-links a {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,.9);
  position: relative;
  padding: 6px 0;
  cursor: pointer;
  transition: color .3s ease;
}
.nav-links a::after {
  content: ''; position: absolute; left: 0; bottom: 0;
  height: 2px; width: 0; background: var(--accent);
  transition: width .3s ease;
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav.scrolled .nav-links a { color: var(--text-dark); }
.nav.scrolled .nav-links a:hover, .nav.scrolled .nav-links a.active { color: var(--accent); }

.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-cta {
  background: var(--accent); color: var(--text-dark);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.5px;
  padding: 12px 22px; border-radius: 6px;
  cursor: pointer;
  transition: background .3s ease, color .3s ease, transform .3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s ease;
}
.nav-cta:hover { background: var(--accent-dark); color: #fff; transform: translateY(-2px); box-shadow: 0 10px 24px rgba(201,169,110,.4); }
.nav-cta:active { transform: scale(0.97); }

.hamburger { display: none; width: 40px; height: 40px; align-items: center; justify-content: center; color: #fff; font-size: 26px; cursor: pointer; }
.nav.scrolled .hamburger { color: var(--text-dark); }

/* Mobile overlay menu */
.mobile-menu {
  position: fixed; inset: 0; background: var(--primary);
  z-index: 1100; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px;
  opacity: 0; pointer-events: none;
  transition: opacity .35s ease;
}
.mobile-menu.open { display: flex; opacity: 1; pointer-events: auto; }
.mobile-close { position: absolute; top: 24px; right: 24px; color: #fff; font-size: 32px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
.mobile-menu ul { list-style: none; padding: 0; margin: 0; text-align: center; }
.mobile-menu ul li { margin: 14px 0; }
.mobile-menu ul a {
  font-family: 'Playfair Display', serif; font-weight: 600; font-size: 26px; color: #fff;
  transition: color .3s ease;
}
.mobile-menu ul a:hover { color: var(--accent); }
.mobile-menu .nav-cta { margin-top: 36px; }

/* ============================================================
   02 — HERO
   ============================================================ */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex; align-items: center;
  overflow: hidden;
  padding: 120px 0 80px;
}
.hero-bg { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
.hero-bg img {
  width: 100%; height: 100%; object-fit: cover;
  transform: scale(1.0);
  animation: kenBurns 20s ease-out infinite alternate;
}
@keyframes kenBurns {
  from { transform: scale(1.0); }
  to   { transform: scale(1.08); }
}
.hero-bg::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.25) 55%, transparent 100%);
}
.hero-content {
  position: relative; z-index: 2;
  padding-left: 8%;
  padding-right: 5%;
  max-width: 760px;
}
.hero h1 { color: #fff; font-weight: 700; font-size: clamp(56px, 9vw, 120px); line-height: 1.02; letter-spacing: -0.02em; margin: 0; }
.hero h1 .line { display: block; opacity: 0; transform: translateY(32px); animation: heroFadeUp .9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.hero h1 .line:nth-child(1) { animation-delay: .15s; }
.hero h1 .line:nth-child(2) { animation-delay: .27s; }
.hero h1 .line.accent {
  font-family: 'Dancing Script', cursive;
  font-weight: 600;
  font-size: clamp(52px, 8vw, 108px);
  color: var(--accent);
  line-height: 1.0;
  letter-spacing: 0;
  margin-top: 6px;
  animation-delay: .39s;
}
@keyframes heroFadeUp { to { opacity: 1; transform: translateY(0); } }

.hero-subtext {
  margin-top: 28px;
  font-size: clamp(16px, 1.3vw, 20px); line-height: 1.65;
  color: rgba(255,255,255,.88);
  max-width: 460px;
  opacity: 0; transform: translateY(20px);
  animation: heroFadeUp .9s cubic-bezier(0.16, 1, 0.3, 1) .6s forwards;
}
.hero-ctas {
  margin-top: 36px;
  display: flex; gap: 16px; flex-wrap: wrap;
  opacity: 0; transform: translateY(20px);
  animation: heroFadeUp .9s cubic-bezier(0.16, 1, 0.3, 1) .75s forwards;
}
.hero-ctas .btn { padding: 18px 36px; font-size: 14px; letter-spacing: 0.14em; }
.hero-play-circle {
  width: 28px; height: 28px; border-radius: 50%;
  background: #fff; color: var(--primary);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1);
}
.hero-ctas .btn:hover .hero-play-circle { transform: scale(1.12); }

/* ============================================================
   03 — BOOKING BAR
   ============================================================ */
.booking-wrap {
  position: relative;
  max-width: 1000px;
  margin: -50px auto 0;
  padding: 0 5%;
  z-index: 10;
}
.booking-bar {
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 12px 50px rgba(0,0,0,.14);
  padding: 22px 28px;
  display: flex; align-items: stretch; gap: 0;
  opacity: 0; transform: translateY(40px);
  animation: slideUp .8s .3s cubic-bezier(0.16, 1, 0.3, 1) both;
  transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .4s ease;
}
.booking-bar:hover { transform: translateY(-2px); box-shadow: 0 20px 60px rgba(0,0,0,.18); }
@keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

.booking-field {
  flex: 1;
  padding: 0 24px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative;
  border-right: 1px solid rgba(0,0,0,.08);
  transition: background .3s ease;
}
.booking-field:first-child { padding-left: 8px; }
.booking-field:last-of-type { border-right: none; }
.booking-field i.ti { transition: transform .3s ease, color .3s ease; }
.booking-field:hover i.ti { transform: scale(1.1); color: var(--accent); }

.booking-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.18em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.booking-value {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 500; color: var(--text-dark);
  cursor: pointer;
}
.booking-value > i:first-child { color: var(--accent); font-size: 18px; }
.booking-value .chev { margin-left: auto; color: var(--text-muted); font-size: 16px; }

/* Date input wrapper */
.booking-date-wrap { position: relative; display: flex; align-items: center; gap: 10px; }
.booking-date-wrap i { color: var(--accent); font-size: 18px; }
.booking-date {
  border: none; outline: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 500;
  color: var(--text-dark);
  padding: 0; width: 100%; min-width: 0;
  cursor: pointer;
}
.booking-date::-webkit-calendar-picker-indicator { opacity: .35; cursor: pointer; }

/* Guests popup */
.guests-trigger {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 500; color: var(--text-dark);
  cursor: pointer; width: 100%;
}
.guests-trigger i.lead { color: var(--accent); font-size: 18px; }
.guests-trigger .chev { margin-left: auto; color: var(--text-muted); font-size: 16px; transition: transform .3s ease; }
.guests-trigger.active .chev { transform: rotate(180deg); }
.guests-popup {
  position: absolute; top: calc(100% + 14px); left: 0; right: 0;
  background: #fff; border-radius: 10px; box-shadow: 0 12px 40px rgba(0,0,0,.18);
  padding: 18px 20px; z-index: 50;
  display: none;
  min-width: 240px;
}
.guests-popup.open { display: block; }
.guests-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
.guests-row + .guests-row { border-top: 1px solid rgba(0,0,0,.06); }
.guests-row-label { font-size: 14px; font-weight: 500; color: var(--text-dark); }
.guests-controls { display: flex; align-items: center; gap: 12px; }
.guests-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: center;
  color: var(--primary); font-size: 16px;
  cursor: pointer;
  transition: all .2s ease;
}
.guests-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(1.08); }
.guests-btn:disabled { opacity: .35; cursor: not-allowed; }
.guests-btn:active { transform: scale(0.95); }
.guests-count { min-width: 18px; text-align: center; font-weight: 600; font-size: 14px; }

.booking-cta {
  background: var(--primary); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.16em;
  padding: 0 32px; border-radius: 8px;
  margin-left: 16px; align-self: stretch;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .3s ease, transform .3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s ease;
  min-height: 56px;
  white-space: nowrap;
}
.booking-cta:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 10px 24px rgba(27,79,92,.28); }
.booking-cta:active { transform: scale(0.97); }

/* ============================================================
   04 — ABOUT
   ============================================================ */
.about {
  background: var(--bg-white);
  padding: 110px 5% 100px;
}
.about-inner {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 45% 55%;
  gap: 70px; align-items: center;
}
.about-left h2 {
  font-size: clamp(40px, 5.5vw, 72px); line-height: 1.08; font-weight: 600;
  margin: 16px 0 22px;
  white-space: pre-line;
  letter-spacing: -0.01em;
}
.about-body {
  font-size: clamp(15px, 1.2vw, 18px); line-height: 1.85;
  color: var(--text-muted);
  max-width: 440px;
}
.about-features {
  display: flex; gap: 28px; margin-top: 32px; flex-wrap: wrap;
}
.about-feature {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  text-align: center;
  min-width: 72px;
  transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1);
}
.about-feature:hover { transform: translateY(-4px); }
.about-feature i {
  color: var(--accent); font-size: 28px;
  transition: transform .3s ease;
}
.about-feature:hover i { transform: scale(1.15); }
.about-feature span {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dark);
  line-height: 1.4;
  white-space: pre-line;
  max-width: 80px;
}
.about-cta { margin-top: 36px; }

.about-right {
  position: relative;
  min-height: 540px;
}
.about-photo {
  position: relative;
  width: 100%; height: 100%;
  min-height: 540px;
  border-radius: 12px;
  overflow: hidden;
  opacity: 0; transform: scale(.97);
  transition: opacity .9s ease, transform .9s ease;
}
.about-photo.visible { opacity: 1; transform: scale(1); }
.about-photo img { width: 100%; height: 100%; object-fit: cover; min-height: 540px; }

.float-quote {
  position: absolute; right: 24px; bottom: 24px;
  background: #fff; padding: 22px 26px;
  border-radius: 10px;
  box-shadow: 0 12px 40px rgba(0,0,0,.15);
  max-width: 280px;
  z-index: 3;
  opacity: 0; transform: translateY(20px);
  transition: opacity .8s .3s cubic-bezier(0.16, 1, 0.3, 1), transform .8s .3s cubic-bezier(0.16, 1, 0.3, 1);
}
.float-quote.visible {
  opacity: 1; transform: translateY(0);
  animation: quoteFloat 4s ease-in-out 1.1s infinite;
}
@keyframes quoteFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.float-quote-line1 { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; font-size: clamp(16px, 1.3vw, 20px); line-height: 1.4; color: var(--text-dark); }
.float-quote-line2 { font-family: 'Dancing Script', cursive; font-size: clamp(24px, 2.6vw, 34px); color: var(--accent); margin-top: 4px; line-height: 1.1; }

.leaf-svg {
  position: absolute;
  right: -14px; bottom: -14px;
  width: 150px; height: 150px;
  opacity: .25; z-index: 2;
  pointer-events: none;
  transform-origin: 80% 80%;
  animation: leafSway 5s ease-in-out infinite alternate;
}
@keyframes leafSway {
  from { transform: rotate(-2deg); }
  to   { transform: rotate(2deg); }
}

/* ============================================================
   05 — ACCOMMODATIONS
   ============================================================ */
.rooms {
  background: var(--bg-cream);
  padding: 110px 5% 110px;
  position: relative;
}
.section-header { max-width: 720px; margin: 0 auto 60px; text-align: center; }
.section-header .eyebrow { margin-bottom: 14px; }
.section-divider {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  color: var(--accent);
  margin: 12px 0 14px;
  font-size: 18px;
}
.section-divider::before, .section-divider::after {
  content: ''; height: 1px; width: 50px; background: var(--accent); opacity: .55;
}
.section-header h2 {
  font-size: clamp(40px, 5.5vw, 72px); font-weight: 600; line-height: 1.08; letter-spacing: -0.01em;
}

.carousel {
  max-width: 1200px; margin: 0 auto;
  position: relative;
  padding: 0 40px;
}
.carousel-viewport {
  overflow: hidden;
}
.carousel-track {
  display: flex;
  gap: 28px;
  transition: transform .5s cubic-bezier(0.16, 1, 0.3, 1);
  will-change: transform;
}

.room-card {
  flex: 0 0 calc((100% - 56px) / 3);
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.05);
  border: 1px solid transparent;
  transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .4s cubic-bezier(0.16, 1, 0.3, 1), border-color .4s ease;
  display: flex; flex-direction: column;
}
.room-card:hover { transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,.18); border: 1px solid rgba(201,169,110,0.35); }
.room-image { height: 230px; overflow: hidden; }
.room-image img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s ease, filter .6s ease; }
.room-card:hover .room-image img { transform: scale(1.05); filter: brightness(1.08); }
.room-body { padding: 24px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
.room-name { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 22px; color: var(--text-dark); }
.room-desc { font-size: 13.5px; line-height: 1.65; color: var(--text-muted); margin: 0; }
.room-dots { display: flex; gap: 6px; }
.room-dots span { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; }
.room-price { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: .5px; }
.room-cta { margin-top: auto; width: 100%; }
.room-cta .btn { width: 100%; padding: 12px 18px; font-size: 12px; }

.carousel-arrow {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,.18);
  z-index: 5;
  cursor: pointer;
  transition: background .3s cubic-bezier(0.16, 1, 0.3, 1), transform .3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .3s ease;
}
.carousel-arrow:hover { background: var(--accent); transform: translateY(-50%) scale(1.1); box-shadow: 0 12px 28px rgba(201,169,110,.4); }
.carousel-arrow:active { transform: translateY(-50%) scale(0.95); }
.carousel-arrow:disabled { opacity: .3; cursor: not-allowed; }
.carousel-arrow.prev { left: -10px; }
.carousel-arrow.next { right: -10px; }

/* ============================================================
   06 — EXPERIENCES
   ============================================================ */
.experiences {
  background: var(--bg-white);
  padding: 110px 5%;
}
.experiences-inner {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 40% 60%;
  gap: 70px; align-items: center;
}
.experiences-left h2 {
  font-size: clamp(40px, 5.5vw, 72px); font-weight: 600; line-height: 1.08;
  white-space: pre-line;
  margin: 16px 0 28px;
  max-width: 480px;
  letter-spacing: -0.01em;
}
.experiences-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 36px 28px;
}
.exp-item { text-align: center; cursor: pointer; }
.exp-photo-wrap { position: relative; }
.exp-photo {
  aspect-ratio: 1 / 1;
  border-radius: 10px;
  overflow: hidden;
}
.exp-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform .6s ease, filter .6s ease; }
.exp-item:hover .exp-photo img { transform: scale(1.05); filter: brightness(1.08); }
.exp-badge {
  position: absolute; left: 50%; bottom: 0;
  transform: translate(-50%, 50%) scale(0);
  width: 44px; height: 44px; border-radius: 50%;
  background: #fff; color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px;
  box-shadow: 0 6px 18px rgba(0,0,0,.15);
  transition: transform .5s cubic-bezier(0.16, 1, 0.3, 1), background .3s ease, color .3s ease;
  transition-delay: .3s, 0s, 0s;
}
.exp-item.visible .exp-badge { transform: translate(-50%, 50%) scale(1); }
.exp-item:hover .exp-badge { transform: translate(-50%, 50%) scale(1.1); background: var(--accent); color: #fff; }
.exp-label {
  margin-top: 32px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-dark);
  line-height: 1.5;
  white-space: pre-line;
}

/* ============================================================
   07 — TESTIMONIALS
   ============================================================ */
.reviews {
  background: var(--bg-cream);
  padding: 110px 5%;
}
.review-card {
  flex: 0 0 calc((100% - 56px) / 3);
  background: #fff;
  border-radius: 12px;
  padding: 36px 32px;
  box-shadow: 0 6px 24px rgba(0,0,0,.06);
  border: 1px solid transparent;
  display: flex; flex-direction: column;
  transition: transform .4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .4s cubic-bezier(0.16, 1, 0.3, 1), border-color .4s ease;
}
.review-card:hover { transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,.18); border: 1px solid rgba(201,169,110,0.35); }
.review-quote {
  font-family: 'Playfair Display', serif;
  font-size: clamp(72px, 8vw, 108px); font-weight: 700;
  color: var(--accent); opacity: .4;
  line-height: 1;
  margin-bottom: -26px;
  display: block;
  transform: scale(0);
  transition: transform .5s cubic-bezier(0.16, 1, 0.3, 1);
}
.review-card.visible .review-quote { transform: scale(1); }
.review-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(15px, 1.2vw, 18px);
  line-height: 1.85;
  color: var(--text-dark);
}
.review-line { width: 40px; height: 2px; background: var(--accent); margin: 20px 0; }
.review-author { display: flex; align-items: center; gap: 14px; margin-top: auto; }
.review-avatar { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
.review-avatar img { width: 100%; height: 100%; object-fit: cover; }
.review-name { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--text-dark); }
.review-loc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

/* ============================================================
   08 — CTA BANNER
   ============================================================ */
.cta-banner {
  position: relative;
  background: var(--primary);
  padding: 60px 8%;
  overflow: hidden;
}
.cta-banner-bg { position: absolute; inset: 0; opacity: .15; z-index: 0; }
.cta-banner-bg img { width: 100%; height: 100%; object-fit: cover; }
.cta-banner-inner {
  position: relative; z-index: 2;
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  gap: 32px; flex-wrap: wrap;
}
.cta-banner-left { display: flex; align-items: center; gap: 24px; flex: 1; min-width: 260px; }
.cta-banner-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.cta-banner-headline { font-family: 'Playfair Display', serif; font-weight: 600; font-size: clamp(28px, 3vw, 44px); color: #fff; line-height: 1.18; letter-spacing: -0.01em; }
.cta-banner-body { font-size: 14px; color: rgba(255,255,255,.75); margin-top: 8px; }
.cta-banner .btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 14px 32px rgba(201,169,110,.45); }
.cta-banner .btn:hover i.ti-arrow-right { transform: translateX(6px); }

/* ============================================================
   09 — FOOTER
   ============================================================ */
.footer {
  background: var(--primary);
  color: rgba(255,255,255,.7);
  padding: 80px 5% 40px;
}
.footer-grid {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 1.6fr 1fr 1fr 1.2fr 1.2fr;
  gap: 48px;
}
.footer-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; color: #fff; }
.footer-brand i { color: var(--accent); font-size: 28px; }
.footer-brand-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 19px; letter-spacing: 1px; color: #fff; }
.footer-tagline { font-size: 14px; color: rgba(255,255,255,.6); max-width: 240px; line-height: 1.7; }
.footer-social { margin-top: 22px; display: flex; gap: 10px; }
.footer-social a {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.75);
  font-size: 16px;
  cursor: pointer;
  transition: all .3s ease;
}
.footer-social a:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.08); }

.footer-heading {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--accent);
  margin: 0 0 22px;
}
.footer-list { list-style: none; padding: 0; margin: 0; }
.footer-list li { margin-bottom: 12px; }
.footer-list a {
  font-size: 14px; color: rgba(255,255,255,.6);
  display: inline-block;
  cursor: pointer;
  transition: color .3s ease, transform .3s cubic-bezier(0.16, 1, 0.3, 1);
}
.footer-list a:hover { color: #fff; transform: translateX(4px); }

.footer-contact { list-style: none; padding: 0; margin: 0; }
.footer-contact li {
  display: flex; gap: 12px; margin-bottom: 16px;
  font-size: 13px; color: rgba(255,255,255,.6);
  line-height: 1.55;
}
.footer-contact li i { color: var(--accent); font-size: 16px; flex-shrink: 0; margin-top: 2px; }

.footer-news-body { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 16px; line-height: 1.6; }
.news-form { display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,.3); padding-bottom: 8px; }
.news-form input {
  flex: 1; border: none; outline: none; background: transparent;
  color: #fff; font-size: 14px;
  padding: 6px 0;
}
.news-form input::placeholder { color: rgba(255,255,255,.4); }
.news-form button { color: var(--accent); font-size: 18px; padding: 6px; cursor: pointer; transition: transform .3s cubic-bezier(0.16, 1, 0.3, 1), color .3s ease; }
.news-form button:hover { transform: scale(1.15); color: #fff; }
.news-success {
  margin-top: 12px; font-size: 13px; color: var(--accent);
  opacity: 0; transform: translateY(8px);
  transition: opacity .4s ease, transform .4s cubic-bezier(0.16, 1, 0.3, 1);
  display: none;
}
.news-success.show { opacity: 1; transform: translateY(0); }

.footer-bottom {
  max-width: 1200px; margin: 56px auto 0;
  padding-top: 24px;
  border-top: 1px solid rgba(255,255,255,.1);
  display: flex; justify-content: space-between; gap: 16px;
  flex-wrap: wrap;
  font-size: 12px; color: rgba(255,255,255,.4);
}
.footer-legal a { color: rgba(255,255,255,.4); transition: color .3s ease; }
.footer-legal a:hover { color: var(--accent); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 1024px) {
  .about-inner, .experiences-inner { grid-template-columns: 1fr; gap: 50px; }
  .about-right, .about-photo { min-height: 440px; }
  .room-card { flex: 0 0 calc((100% - 28px) / 2); }
  .review-card { flex: 0 0 calc((100% - 28px) / 2); }
  .footer-grid { grid-template-columns: 1fr 1fr 1fr; }
}

@media (max-width: 768px) {
  .nav-links, .nav-right .nav-cta { display: none; }
  .hamburger { display: flex; }

  .hero { padding: 120px 0 60px; }
  .hero-content { padding-left: 6%; padding-right: 6%; }
  .hero-subtext { max-width: 100%; }
  .hero-ctas .btn { padding: 16px 28px; }

  .booking-wrap { margin-top: -30px; padding: 0 4%; }
  .booking-bar { flex-direction: column; gap: 4px; padding: 18px; }
  .booking-field { border-right: none; border-bottom: 1px solid rgba(0,0,0,.08); padding: 14px 8px !important; }
  .booking-field:last-of-type { border-bottom: none; }
  .booking-cta { margin: 12px 0 0; width: 100%; padding: 16px; min-height: 50px; }

  .about, .rooms, .experiences, .reviews { padding-top: 80px; padding-bottom: 80px; }
  .about-right, .about-photo { min-height: 360px; }
  .about-photo img { min-height: 360px; }
  .float-quote { right: 12px; bottom: 12px; padding: 16px 18px; max-width: 230px; }
  .about-features { gap: 18px; }

  .room-card, .review-card { flex: 0 0 100%; }
  .carousel { padding: 0 30px; }

  .experiences-grid { gap: 28px 18px; }
  .exp-label { margin-top: 28px; font-size: 10px; }

  .cta-banner-inner { flex-direction: column; text-align: center; }
  .cta-banner-left { flex-direction: column; text-align: center; gap: 16px; }
  .cta-banner .btn { width: 100%; }

  .footer-grid { grid-template-columns: 1fr; gap: 36px; }
  .footer-bottom { flex-direction: column; text-align: center; }
}

@media (max-width: 480px) {
  .about, .rooms, .experiences, .reviews { padding: 60px 20px; }
  .hero-ctas .btn { width: 100%; }
  .float-quote { max-width: 200px; padding: 14px 16px; }
}

/* Reduced motion: disable looping animations, soften reveals */
@media (prefers-reduced-motion: reduce) {
  .hero-bg img { animation: none; }
  .float-quote.visible { animation: none; }
  .leaf-svg { animation: none; }
  .reveal {
    transform: none;
    transition: opacity .5s ease;
  }
  .reveal.visible { transform: none; }
  .hero h1 .line, .hero-subtext, .hero-ctas {
    animation-duration: .5s;
    transform: none;
  }
  .booking-bar { animation-duration: .5s; }
}

/* Smooth offset for anchor jumps with fixed nav */
section[id] { scroll-margin-top: 90px; }
</style>

  document.getElementById('navCta').textContent    = CTA_NAV_TEXT;

  // Nav links
  const navLinks = document.getElementById('navLinks');
  const mobileLinks = document.getElementById('mobileLinks');
  NAV_LINKS.forEach(l => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="${l.href}" data-section="${l.href.slice(1)}">${l.label}</a>`;
    navLinks.appendChild(li);

    const mli = document.createElement('li');

  // Hero
  document.getElementById('heroImg').src = BG_HERO_IMAGE;
  document.getElementById('heroLine1').textContent = HERO_LINE_1;
  document.getElementById('heroLine2').textContent = HERO_LINE_2;
  document.getElementById('heroLine3').textContent = HERO_LINE_3;
  document.getElementById('heroSubtext').textContent = HERO_SUBTEXT;
  document.getElementById('ctaPrimary').textContent = CTA_PRIMARY;
  document.getElementById('ctaSecondary').textContent = CTA_SECONDARY;

  // Booking: set default dates
  const today = new Date();
  const inDate  = new Date(today); inDate.setDate(today.getDate() + 7);
  const outDate = new Date(today); outDate.setDate(today.getDate() + 9);
  const fmt = d => d.toISOString().slice(0, 10);
  document.getElementById('checkin').value  = fmt(inDate);
  document.getElementById('checkout').value = fmt(outDate);
  document.getElementById('bookingCta').textContent = BOOKING_CTA_TEXT;
  document.getElementById('guestsLabel').textContent = BOOKING_GUESTS_DEFAULT;

  // About
  document.getElementById('aboutLabel').textContent = ABOUT_LABEL;
  document.getElementById('aboutHeadline').textContent = ABOUT_HEADLINE;
  document.getElementById('aboutBody').textContent = ABOUT_BODY;
  document.getElementById('ctaAbout').textContent = CTA_ABOUT;
  document.getElementById('aboutImg').src = PHOTO_ABOUT;
  document.getElementById('quoteLine1').textContent = ABOUT_FLOAT_QUOTE_LINE_1;
  document.getElementById('quoteLine2').textContent = ABOUT_FLOAT_QUOTE_LINE_2;

  const aboutFeatures = document.getElementById('aboutFeatures');
  ABOUT_FEATURES.forEach(f => {
    const el = document.createElement('div');
    el.className = 'about-feature';
    el.innerHTML = `<i class="ti ${f.icon}"></i><span>${f.label}</span>`;
    aboutFeatures.appendChild(el);
  });

  // Rooms
  document.getElementById('roomsLabel').textContent = ROOMS_LABEL;
  document.getElementById('roomsHeadline').textContent = ROOMS_HEADLINE;
  const roomsTrack = document.getElementById('roomsTrack');
  ROOMS.forEach(r => {
    const card = document.createElement('div');
    card.className = 'room-card';
    card.innerHTML = `
      <div class="room-image"><img src="${r.image}" alt="${r.name}" loading="lazy" /></div>
      <div class="room-body">
        <h3 class="room-name">${r.name}</h3>
        <p class="room-desc">${r.desc}</p>
        <div class="room-dots"><span></span><span></span><span></span></div>
        <div class="room-price">${r.price}</div>
        <div class="room-cta"><a href="#offers" class="btn btn-primary">${r.cta}</a></div>
      </div>`;
    roomsTrack.appendChild(card);
  });

  // Experiences
  document.getElementById('expLabel').textContent = EXPERIENCES_LABEL;
  document.getElementById('expHeadline').textContent = EXPERIENCES_HEADLINE;
  document.getElementById('ctaExp').textContent = CTA_EXPERIENCES;
  const expGrid = document.getElementById('expGrid');
  EXPERIENCES.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = `exp-item reveal delay-${(i % 4) + 1}`;
    item.innerHTML = `
      <div class="exp-photo-wrap">
        <div class="exp-photo"><img src="${e.image}" alt="${e.label}" loading="lazy" /></div>
        <div class="exp-badge"><i class="ti ${e.icon}"></i></div>
      </div>
      <div class="exp-label">${e.label}</div>`;
    expGrid.appendChild(item);
  });

  // Reviews
  document.getElementById('reviewsLabel').textContent = REVIEWS_LABEL;
  document.getElementById('reviewsHeadline').textContent = REVIEWS_HEADLINE;
  const reviewsTrack = document.getElementById('reviewsTrack');
  REVIEWS.forEach(r => {
    const card = document.createElement('div');
    card.className = 'review-card';
    card.innerHTML = `
      <span class="review-quote">&ldquo;</span>
      <p class="review-text">${r.quote}</p>
      <div class="review-line"></div>
      <div class="review-author">
        <div class="review-avatar"><img src="${r.avatar}" alt="${r.name}" loading="lazy" /></div>
        <div>
          <div class="review-name">— ${r.name}</div>
          <div class="review-loc">${r.location}</div>
        </div>
      </div>`;
    reviewsTrack.appendChild(card);
  });

  // CTA Banner
  document.getElementById('ctaBannerImg').src = BG_CTA_IMAGE;
  document.getElementById('ctaBannerHeadline').textContent = CTA_BANNER_HEADLINE;
  document.getElementById('ctaBannerBody').textContent = CTA_BANNER_BODY;
  const ctaBtn = document.getElementById('ctaBannerBtn');
  ctaBtn.innerHTML = `${CTA_BANNER_BTN} <i class="ti ti-arrow-right"></i>`;

  // Footer
  document.getElementById('footerBrand').textContent = BRAND_NAME;
  document.getElementById('footerTagline').textContent = FOOTER_TAGLINE;
  document.getElementById('footerNewsBody').textContent = NEWSLETTER_BODY;
  document.getElementById('footerCopyright').textContent = COPYRIGHT;

  const footerQuick = document.getElementById('footerQuick');
  FOOTER_QUICK_LINKS.forEach(l => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="#">${l}</a>`;
    footerQuick.appendChild(li);
  });
  const footerInfo = document.getElementById('footerInfo');
  FOOTER_INFO_LINKS.forEach(l => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="#">${l}</a>`;
    footerInfo.appendChild(li);
  });

  const footerContact = document.getElementById('footerContact');
  const contactRows = [
    { icon:'ti-map-pin', text: FOOTER_ADDRESS },
    { icon:'ti-phone',   text: FOOTER_PHONE },
    { icon:'ti-mail',    text: FOOTER_EMAIL },
    { icon:'ti-clock',   text: FOOTER_HOURS }
  ];
  contactRows.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `<i class="ti ${c.icon}"></i><span>${c.text}</span>`;
    footerContact.appendChild(li);
  });

  const footerSocial = document.getElementById('footerSocial');
  const socials = [
    { icon: 'ti-brand-facebook',  href: SOCIAL_LINKS.facebook,  label: 'Facebook' },
    { icon: 'ti-brand-instagram', href: SOCIAL_LINKS.instagram, label: 'Instagram' },
    { icon: 'ti-brand-tiktok',    href: SOCIAL_LINKS.tiktok,    label: 'TikTok' },
    { icon: 'ti-brand-x',         href: SOCIAL_LINKS.twitter,   label: 'X' }
  ];
  socials.forEach(s => {
    const a = document.createElement('a');
    a.href = s.href; a.setAttribute('aria-label', s.label);
    a.innerHTML = `<i class="ti ${s.icon}"></i>`;
    footerSocial.appendChild(a);
  });

  const footerLegal = document.getElementById('footerLegal');
  FOOTER_LEGAL.forEach((l, i) => {
    if (i > 0) footerLegal.appendChild(document.createTextNode(' | '));
    const a = document.createElement('a');
    a.href = l.href; a.textContent = l.label;
    footerLegal.appendChild(a);
  });

  /* ==========================================================
     INTERACTIVE
     ========================================================== */

  // Nav scroll
  const nav = document.getElementById('nav');
  const onScroll = () => {
    if (window.scrollY > 50) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  // Mobile menu
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  const mobileClose = document.getElementById('mobileClose');
  hamburger.addEventListener('click', () => mobileMenu.classList.add('open'));
  mobileClose.addEventListener('click', () => mobileMenu.classList.remove('open'));
  mobileMenu.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => mobileMenu.classList.remove('open'))
  );

  // Guests popup
  const guestsTrigger = document.getElementById('guestsTrigger');
  const guestsPopup = document.getElementById('guestsPopup');
  const guestsLabel = document.getElementById('guestsLabel');
  const adultsCount = document.getElementById('adultsCount');
  const childrenCount = document.getElementById('childrenCount');
  let adults = 2, children = 0;

  const updateGuestsLabel = () => {
    guestsLabel.textContent = `${adults} ${adults === 1 ? 'Adult' : 'Adults'}, ${children} ${children === 1 ? 'Kid' : 'Kids'}`;
    adultsCount.textContent = adults;
    childrenCount.textContent = children;
    // Disable buttons at bounds
    document.querySelectorAll('.guests-btn').forEach(b => {
      const tgt = b.dataset.target, act = b.dataset.act;
      if (tgt === 'adults') b.disabled = (act === 'dec' && adults <= 1) || (act === 'inc' && adults >= 12);
      if (tgt === 'children') b.disabled = (act === 'dec' && children <= 0) || (act === 'inc' && children >= 10);
    });
  };
  updateGuestsLabel();

  guestsTrigger.addEventListener('click', (e) => {
    e.stopPropagation();
    guestsPopup.classList.toggle('open');
    guestsTrigger.classList.toggle('active');
  });
  document.addEventListener('click', (e) => {
    if (!guestsPopup.contains(e.target) && !guestsTrigger.contains(e.target)) {
      guestsPopup.classList.remove('open');
      guestsTrigger.classList.remove('active');
    }
  });
  document.querySelectorAll('.guests-btn').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      const t = b.dataset.target, a = b.dataset.act;
      if (t === 'adults') adults = a === 'inc' ? Math.min(12, adults + 1) : Math.max(1, adults - 1);
      if (t === 'children') children = a === 'inc' ? Math.min(10, children + 1) : Math.max(0, children - 1);
      updateGuestsLabel();
    });
  });

  // ===== Carousel factory =====
  function buildCarousel({ trackId, prevId, nextId, viewportSel, visiblePerView }) {
    const track = document.getElementById(trackId);
    const prev = document.getElementById(prevId);
    const next = document.getElementById(nextId);
    const viewport = track.parentElement;
    let index = 0;

    function calcVisible() {
      if (window.innerWidth <= 768) return 1;
      if (window.innerWidth <= 1024) return 2;
      return visiblePerView;
    }

    function slide(dir) {
      const cards = track.children;
      const visible = calcVisible();
      const max = Math.max(0, cards.length - visible);
      index += dir;
      if (index < 0) index = 0;
      if (index > max) index = max;
      const cardWidth = cards[0].offsetWidth + 28; // gap
      track.style.transform = `translateX(-${index * cardWidth}px)`;
      prev.disabled = index === 0;
      next.disabled = index === max;
    }

    prev.addEventListener('click', () => slide(-1));
    next.addEventListener('click', () => slide(1));

    // Touch swipe
    let touchStart = 0, touchEnd = 0;
    viewport.addEventListener('touchstart', (e) => { touchStart = e.changedTouches[0].clientX; }, { passive: true });
    viewport.addEventListener('touchend',   (e) => {
      touchEnd = e.changedTouches[0].clientX;
      const diff = touchStart - touchEnd;
      if (diff > 50) slide(1);
      else if (diff < -50) slide(-1);
    }, { passive: true });

    // Recalculate on resize
    window.addEventListener('resize', () => {
      index = 0;
      track.style.transform = `translateX(0)`;
      const visible = calcVisible();
      const max = Math.max(0, track.children.length - visible);
      prev.disabled = true;
      next.disabled = max === 0;
    });

    // Initial state
    setTimeout(() => {
      const visible = calcVisible();
      const max = Math.max(0, track.children.length - visible);
      prev.disabled = true;
      next.disabled = max === 0;
    }, 50);
  }

  buildCarousel({ trackId: 'roomsTrack',   prevId: 'roomsPrev',   nextId: 'roomsNext',   visiblePerView: 3 });
  buildCarousel({ trackId: 'reviewsTrack', prevId: 'reviewsPrev', nextId: 'reviewsNext', visiblePerView: 3 });

  // ===== Newsletter =====
  document.getElementById('newsForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('newsEmail').value.trim();
    if (!email) return;
    document.getElementById('newsForm').style.display = 'none';
    const success = document.getElementById('newsSuccess');
    success.style.display = 'block';
    // Allow display change to commit, then trigger the fade-in transition.
    requestAnimationFrame(() => success.classList.add('show'));
  });

  // ===== Reveal observer =====
  const revealEls = document.querySelectorAll('.reveal, #aboutPhoto, #floatQuote, .exp-item, .review-card');
  const revealObs = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        en.target.classList.add('visible');
        revealObs.unobserve(en.target);
      }
    });
  }, { threshold: 0.15 });
  revealEls.forEach(el => revealObs.observe(el));

  // ===== Nav active state =====
  const sections = document.querySelectorAll('section[id]');
  const navAnchors = document.querySelectorAll('#navLinks a');
  const sectionObs = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        const id = en.target.id;
        navAnchors.forEach(a => {
          a.classList.toggle('active', a.dataset.section === id);
        });
      }
    });
  }, { threshold: 0.5 });
  sections.forEach(s => sectionObs.observe(s));

});
</script>
