<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero Variation 2 — Sample Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
<style>
  /* ============================================
     CLIENT VARIABLES — EDIT BEFORE LAUNCH
     ============================================
     STEP 1: Replace background image URL
     STEP 2: Replace video URL (for play button)
     STEP 3: Replace featured-in logo array
     STEP 4: Update all copy below
     STEP 5: Replace logo text or image
     ============================================ */
  :root {
    --bg:         #0A0A0F;
    --accent:     #00E5CC;
    --text:       #FFFFFF;
    --muted:      #A0A0B0;
    --nav-height: 70px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  /* ============================================
     NAV
     ============================================ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-height);
    display: flex; align-items: center;
    padding: 0 32px; z-index: 100;
    transition: background-color .3s ease, backdrop-filter .3s ease, border-color .3s ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(14px);
    border-bottom-color: rgba(255,255,255,0.06);
  }
  .nav-inner { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; }
  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; letter-spacing: 0.08em;
    font-size: 18px; color: var(--text);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 28px; justify-self: center; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 14px; font-weight: 500;
    transition: color .2s ease;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-search {
    justify-self: end;
    width: 36px; height: 36px;
    display: grid; place-items: center;
    color: var(--muted); background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%; cursor: pointer;
    transition: color .2s ease, border-color .2s ease;
  }
  .nav-search:hover { color: var(--accent); border-color: var(--accent); }
  .nav-burger { display: none; }

  /* ============================================
     HERO
     ============================================ */
  .hero {
    position: relative;
    min-height: 100vh;
    padding: calc(var(--nav-height) + 70px) 24px 160px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background-image: var(--bg-image);
    background-size: cover; background-position: center;
    animation: kenburns 26s ease-in-out infinite alternate;
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.40) 0%, rgba(0,0,0,0.75) 100%),
      radial-gradient(ellipse at 50% 35%, rgba(0,229,204,0.10) 0%, transparent 60%);
  }
  @keyframes kenburns {
    0%   { transform: scale(1)    translate(0, 0); }
    100% { transform: scale(1.07) translate(-1%, -1%); }
  }

  .hero-inner { position: relative; z-index: 1; width: 100%; max-width: 920px; }

  .pre {
    color: var(--text);
    font-size: clamp(13px, 1.4vw, 16px);
    font-weight: 500;
    letter-spacing: 0.01em;
    margin-bottom: 22px;
    opacity: 0; transform: translateY(16px);
    animation: rise .8s .15s ease forwards;
  }
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(36px, 6.2vw, 70px);
    line-height: 1.06;
    color: var(--text);
    margin-bottom: 38px;
    opacity: 0; transform: translateY(20px);
    animation: rise .9s .3s ease forwards;
  }
  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent); color: #0A1A18;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em;
    padding: 15px 38px; border-radius: 999px;
    text-decoration: none; cursor: pointer; border: none;
    box-shadow: 0 8px 30px rgba(0, 229, 204, 0.18);
    transition: transform .2s ease, box-shadow .25s ease, filter .2s ease;
    opacity: 0; transform: translateY(16px);
    animation: rise .9s .5s ease forwards;
  }
  .cta:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 12px 50px rgba(0, 229, 204, 0.42);
    filter: brightness(1.05);
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* ============================================
     PLAY BUTTON (overlay on BG)
     ============================================ */
  .play {
    position: absolute;
    top: 58%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--accent);
    display: grid; place-items: center;
    cursor: pointer; border: none;
    box-shadow: 0 0 0 0 rgba(0,229,204,0.55), 0 8px 28px rgba(0,0,0,0.4);
    animation: pulse 2.4s ease-in-out infinite, fadePop 1s .9s ease both;
  }
  .play:hover { filter: brightness(1.05); transform: translate(-50%, -50%) scale(1.05); }
  .play svg { width: 28px; height: 28px; fill: #0A1A18; margin-left: 4px; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(0,229,204,0.55), 0 8px 28px rgba(0,0,0,0.4); }
    70%  { box-shadow: 0 0 0 26px rgba(0,229,204,0),    0 8px 28px rgba(0,0,0,0.4); }
    100% { box-shadow: 0 0 0 0   rgba(0,229,204,0),    0 8px 28px rgba(0,0,0,0.4); }
  }
  @keyframes fadePop {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* ============================================
     FEATURED IN STRIP
     ============================================ */
  .featured {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 1;
    padding: 26px 24px 36px;
    text-align: center;
    background: linear-gradient(180deg, rgba(5, 8, 18, 0) 0%, rgba(5, 8, 18, 0.65) 50%, rgba(5, 8, 18, 0.85) 100%);
    opacity: 0;
    animation: rise .8s 1.05s ease forwards;
  }
  .featured-label {
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .featured-logos {
    display: flex; gap: clamp(28px, 5vw, 64px);
    justify-content: center; align-items: center;
    flex-wrap: wrap;
    color: rgba(255, 255, 255, 0.85);
  }
  .featured-logos .logo {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 2.4vw, 28px);
    font-weight: 700;
    letter-spacing: 0.02em;
    filter: grayscale(1);
    opacity: 0.82;
    transition: opacity .25s ease, filter .25s ease;
  }
  .featured-logos .logo:hover { opacity: 1; filter: none; }
  .featured-logos .logo.sans { font-family: 'Space Grotesk', sans-serif; font-weight: 700; }
  .featured-logos .logo.fortune { letter-spacing: 0.32em; text-transform: uppercase; font-size: clamp(16px, 1.8vw, 22px); }
  .featured-logos .logo.success { letter-spacing: 0.18em; text-transform: uppercase; font-size: clamp(16px, 1.9vw, 22px); }

  /* ============================================
     MOBILE
     ============================================ */
  @media (max-width: 768px) {
    .nav { padding: 0 18px; }
    .nav-links { display: none; }
    .nav-burger {
      display: grid; place-items: center;
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      justify-self: end; cursor: pointer;
    }
    .nav-search { display: none; }
    .nav-inner { grid-template-columns: 1fr auto; }
    .hero { padding: calc(var(--nav-height) + 40px) 18px 180px; }
    .play { width: 64px; height: 64px; top: 62%; }
    .play svg { width: 22px; height: 22px; }
    .featured { padding: 22px 18px 28px; }
    .featured-logos { gap: 22px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; animation-iteration-count: 1 !important; transition-duration: 0.001s !important; }
  }
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="#" id="logo-text">TONY ROBBINS</a>
    <div class="nav-links" id="nav-links"></div>
    <button class="nav-search" aria-label="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </button>
    <button class="nav-burger" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-bg" id="hero-bg"></div>

  <div class="hero-inner">
    <p class="pre" id="pre">Unlock The Power Within And Achieve Your Dreams</p>
    <h1>
      Proven Techniques For Personal<br>
      And Professional Growth
    </h1>
    <a href="#" class="cta" id="cta">
      Get Started
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
  </div>

  <!-- Featured-in strip -->
  <div class="featured">
    <p class="featured-label" id="featured-label">Tony Has Been Featured In:</p>
    <div class="featured-logos" id="featured-logos"></div>
  </div>
</section>

<script>
  /* ============================================
     CLIENT VARIABLES — EDIT BEFORE LAUNCH
     ============================================ */
  const LOGO_TEXT     = "TONY ROBBINS";
  const BG_IMAGE      = "/private/hero-v2-sample-bg.webp";
  const VIDEO_URL     = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  const NAV_LINKS = [
    { label: "About",    href: "#about"    },
    { label: "Mission",  href: "#mission"  },
    { label: "Events",   href: "#events"   },
    { label: "Programs", href: "#programs" },
    { label: "Coaching", href: "#coaching" },
    { label: "Shop",     href: "#shop"     },
    { label: "Blog",     href: "#blog"     },
  ];
  const FEATURED_LABEL = "Tony Has Been Featured In:";
  const FEATURED_LOGOS = [
    { name: "SUCCESS",  cls: "success"            },
    { name: "Inc.",     cls: ""                   },
    { name: "Forbes",   cls: ""                   },
    { name: "FORTUNE",  cls: "fortune sans"       },
  ];

  // Apply BG image as CSS var
  document.documentElement.style.setProperty('--bg-image', `url('${BG_IMAGE}')`);

  // Logo text
  document.getElementById('logo-text').textContent = LOGO_TEXT;

  // Nav links
  document.getElementById('nav-links').innerHTML =
    NAV_LINKS.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

  // Featured-in label + logos
  document.getElementById('featured-label').textContent = FEATURED_LABEL;
  document.getElementById('featured-logos').innerHTML =
    FEATURED_LOGOS.map(l => `<span class="logo ${l.cls}">${l.name}</span>`).join('');

  // Sticky nav scroll behavior
  const navEl = document.getElementById('nav');
  const onScroll = () => navEl.classList.toggle('scrolled', window.scrollY > 12);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

</script>

</body>
</html>
