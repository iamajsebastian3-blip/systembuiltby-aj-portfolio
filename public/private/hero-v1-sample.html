<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero Variation 1 — Sample Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================
     CLIENT VARIABLES — EDIT BEFORE LAUNCH
     ============================================
     STEP 1: Replace background image URL
     STEP 2: Replace video thumbnail URL
     STEP 3: Set countdown date (if used elsewhere)
     STEP 4: Update all copy below
     STEP 5: Replace logo text or image
     ============================================ */
  :root {
    --bg:         #0A0A0F;
    --accent:     #00E5CC;
    --text:       #FFFFFF;
    --muted:      #A0A0B0;
    --nav-height: 70px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

  /* ============================================
     NAV
     ============================================ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--nav-height);
    display: flex; align-items: center;
    padding: 0 32px;
    z-index: 100;
    transition: background-color .3s ease, backdrop-filter .3s ease, border-color .3s ease;
    border-bottom: 1px solid transparent;
  }
  .nav.scrolled {
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(14px);
    border-bottom-color: rgba(255,255,255,0.06);
  }
  .nav-inner { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px; }
  .nav-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; letter-spacing: 0.08em;
    font-size: 18px; color: var(--text);
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 28px; justify-self: center; }
  .nav-links a {
    color: var(--muted); text-decoration: none;
    font-size: 14px; font-weight: 500;
    transition: color .2s ease;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-search {
    justify-self: end;
    width: 36px; height: 36px;
    display: grid; place-items: center;
    color: var(--muted);
    background: transparent; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%; cursor: pointer;
    transition: color .2s ease, border-color .2s ease;
  }
  .nav-search:hover { color: var(--accent); border-color: var(--accent); }
  .nav-burger { display: none; }

  /* ============================================
     HERO
     ============================================ */
  .hero {
    position: relative;
    min-height: 100vh;
    padding: calc(var(--nav-height) + 60px) 24px 100px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background-image: var(--bg-image);
    background-size: cover; background-position: center;
    animation: kenburns 24s ease-in-out infinite alternate;
  }
  .hero-bg::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.7) 100%),
      radial-gradient(ellipse at 50% 30%, rgba(0,229,204,0.10) 0%, transparent 60%);
  }
  @keyframes kenburns {
    0%   { transform: scale(1)    translate(0, 0); }
    100% { transform: scale(1.06) translate(-1%, -1%); }
  }

  .hero-inner { position: relative; z-index: 1; width: 100%; max-width: 880px; }

  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(36px, 6vw, 64px);
    line-height: 1.08;
    color: var(--text);
    margin-bottom: 18px;
    opacity: 0; transform: translateY(20px);
    animation: rise .9s .15s ease forwards;
  }
  .hero p.sub {
    color: var(--muted);
    font-size: clamp(15px, 1.6vw, 18px);
    line-height: 1.6;
    margin-bottom: 36px;
    opacity: 0; transform: translateY(20px);
    animation: rise .9s .35s ease forwards;
  }
  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent);
    color: #0A1A18;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.14em;
    padding: 16px 36px; border-radius: 999px;
    text-decoration: none;
    cursor: pointer; border: none;
    box-shadow: 0 8px 30px rgba(0, 229, 204, 0.18);
    transition: transform .2s ease, box-shadow .25s ease, filter .2s ease;
    opacity: 0; transform: translateY(20px);
    animation: rise .9s .55s ease forwards;
  }
  .cta:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 50px rgba(0, 229, 204, 0.42); filter: brightness(1.05); }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  /* ============================================
     VIDEO BLOCK
     ============================================ */
  .video-wrap {
    margin-top: 60px;
    width: 100%; max-width: 880px;
    aspect-ratio: 16 / 9;
    position: relative; z-index: 1;
    border-radius: 18px;
    overflow: hidden;
    background-image: var(--video-thumb);
    background-size: cover; background-position: center;
    border: 1px solid rgba(255,255,255,0.10);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(0,229,204,0.08), 0 0 80px rgba(0,229,204,0.10);
    cursor: pointer;
    opacity: 0; transform: scale(0.96);
    animation: vidIn 1s .8s ease forwards;
  }
  .video-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
  }
  .play {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 88px; height: 88px;
    border-radius: 50%;
    background: var(--accent);
    display: grid; place-items: center;
    box-shadow: 0 0 0 0 rgba(0,229,204,0.55);
    animation: pulse 2.4s ease-in-out infinite;
  }
  .play svg { width: 28px; height: 28px; fill: #0A1A18; margin-left: 4px; }
  @keyframes vidIn { to { opacity: 1; transform: scale(1); } }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(0,229,204,0.55); }
    70%  { box-shadow: 0 0 0 24px rgba(0,229,204,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,229,204,0); }
  }

  /* ============================================
     MOBILE
     ============================================ */
  @media (max-width: 768px) {
    .nav { padding: 0 18px; }
    .nav-links { display: none; }
    .nav-burger {
      display: grid; place-items: center;
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      justify-self: end;
      cursor: pointer;
    }
    .nav-search { display: none; }
    .nav-inner { grid-template-columns: 1fr auto; }
    .hero { padding: calc(var(--nav-height) + 40px) 18px 70px; }
    .video-wrap { margin-top: 40px; border-radius: 14px; }
    .play { width: 64px; height: 64px; }
    .play svg { width: 22px; height: 22px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001s !important; animation-iteration-count: 1 !important; transition-duration: 0.001s !important; }
  }
</style>
</head>
<body>

<!-- ===== NAV ===== -->
<nav class="nav" id="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="#" id="logo-text">TONY ROBBINS</a>
    <div class="nav-links" id="nav-links">
      <!-- populated by JS -->
    </div>
    <button class="nav-search" aria-label="Search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </button>
    <button class="nav-burger" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-inner">
    <h1>
      Unlock The Power Within<br>
      And Achieve Your Dreams
    </h1>
    <p class="sub">Proven Techniques For Personal And Professional Growth</p>
    <a href="#" class="cta" id="cta">
      Get Started
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>

    <div class="video-wrap" id="video" role="button" aria-label="Play video">
      <div class="play" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
      </div>
    </div>
  </div>
</section>

<script>
  /* ============================================
     CLIENT VARIABLES — EDIT BEFORE LAUNCH
     ============================================ */
  const LOGO            = "TONY ROBBINS";
  const COUNTDOWN_DATE  = "2026-08-01T00:00:00";
  const BG_IMAGE        = "/private/hero-v1-sample-bg.webp";
  const VIDEO_THUMB     = "/private/hero-v1-sample-video.webp";
  const VIDEO_URL       = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  const NAV_LINKS = [
    { label: "About",    href: "#about"    },
    { label: "Mission",  href: "#mission"  },
    { label: "Events",   href: "#events"   },
    { label: "Programs", href: "#programs" },
    { label: "Coaching", href: "#coaching" },
    { label: "Shop",     href: "#shop"     },
    { label: "Blog",     href: "#blog"     },
  ];

  // Inject background + thumbnail (as CSS custom properties)
  document.documentElement.style.setProperty('--bg-image',    `url('${BG_IMAGE}')`);
  document.documentElement.style.setProperty('--video-thumb', `url('${VIDEO_THUMB}')`);

  // Logo
  document.getElementById('logo-text').textContent = LOGO;

  // Render nav links
  const navLinksEl = document.getElementById('nav-links');
  navLinksEl.innerHTML = NAV_LINKS.map(l => `<a href="${l.href}">${l.label}</a>`).join('');

  // Sticky nav scroll behaviour
  const navEl = document.getElementById('nav');
  const onScroll = () => navEl.classList.toggle('scrolled', window.scrollY > 12);
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  // Video click → open in new tab
  document.getElementById('video').addEventListener('click', () => {
    if (VIDEO_URL) window.open(VIDEO_URL, '_blank', 'noopener,noreferrer');
  });
</script>

</body>
</html>
